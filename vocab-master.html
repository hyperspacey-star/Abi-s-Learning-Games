<script>
    // 👇 EDIT YOUR WEEKLY WORDS HERE 👇
    let words = [
        "spoil", "scout", "mouth", "proud", "noise", 
        "downpour", "soil", "south", "cloud", "shower"
    ];
    // 👆 --------------------------------- 👆

    let currentRound = 1;
    let wordIndex = 0;
    let lightningFirstTries = 0;
    let attemptsThisWord = 0;
    let currentWord = "";
    let countdownInterval;
    
    // Create one single, reusable audio player
    let currentAudio = new Audio(); 
    
    // This will alert us if the folder/file is named wrong on GitHub
    currentAudio.onerror = function() {
        alert("🚨 FILE NOT FOUND 🚨\n\nThe iPad is looking for:\n" + currentAudio.src + "\n\nCheck your GitHub folder and file names!");
    };

    function startRound(roundNum) {
        // Unlock the audio player on the very first tap
        currentAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
        currentAudio.play().catch(e => console.log("Unlock failed, but that's okay."));

        currentRound = roundNum;
        wordIndex = 0;
        lightningFirstTries = 0;
        
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('totalWords').innerText = words.length;
        document.getElementById('roundTitle').innerText = currentRound === 1 ? "Round 1: 10 Second Study" : "⚡ Round 2: 5 Second Lightning! ⚡";
        document.getElementById('startRound2Btn').style.display = 'none';

        playTurn();
    }

    function playTurn() {
        currentWord = words[wordIndex];
        attemptsThisWord = 0;
        document.getElementById('currentWordNum').innerText = wordIndex + 1;
        document.getElementById('feedback').innerText = "";
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'none';
        
        // Show the giant Listen button during the timer phase
        showWordTimer();
    }

    // THE FIX: This is called ONLY when Abi physically taps a button
    function playCurrentWord() {
        currentAudio.src = 'audio/' + currentWord.toLowerCase() + '.wav';
        currentAudio.play().catch(function(error) {
            alert("iPad Audio Error: " + error.message);
        });
    }

    function showWordTimer() {
        let timeLeft = currentRound === 1 ? 10 : 5;
        
        document.getElementById('instructions').innerText = "Memorize the word...";
        
        // We add the big audio button right above the word she is studying
        document.getElementById('wordDisplay').innerHTML = `
            <button onclick="playCurrentWord()" style="background-color: #ffa500; padding: 10px 20px; font-size: 24px; border-radius: 10px; margin-bottom: 15px; border: none; font-weight: bold; color: white;">🔊 Listen</button>
            <br>
            ${currentWord}
        `;
        document.getElementById('wordDisplay').style.display = 'block';
        
        document.getElementById('typeArea').style.display = 'none';
        document.getElementById('feedback').innerText = "";
        document.getElementById('retryBtn').style.display = 'none';
        document.getElementById('playerInput').value = "";

        document.getElementById('timerDisplay').innerText = `⏳ ${timeLeft} seconds left!`;

        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                document.getElementById('timerDisplay').innerText = `⏳ ${timeLeft} seconds left!`;
            } else {
                clearInterval(countdownInterval);
                document.getElementById('timerDisplay').innerText = "";
                document.getElementById('instructions').innerText = "Now type it!";
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('typeArea').style.display = 'block';
                document.getElementById('playerInput').focus();
            }
        }, 1000);
    }

    function checkWord() {
        let guess = document.getElementById('playerInput').value.trim();
        let feedbackEl = document.getElementById('feedback');
        attemptsThisWord++;
        
        document.getElementById('typeArea').style.display = 'none';
        
        if (guess.toLowerCase() === currentWord.toLowerCase()) {
            feedbackEl.innerText = "✅ Awesome! Correct!";
            feedbackEl.style.color = "#32cd32";
            
            if (currentRound === 2 && attemptsThisWord === 1) {
                lightningFirstTries++;
            }

            if (wordIndex < words.length - 1) {
                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                if (currentRound === 1) {
                    feedbackEl.innerText += " 🎉 Round 1 Complete!";
                    document.getElementById('startRound2Btn').style.display = 'inline-block';
                } else {
                    endGame();
                }
            }
        } else {
            feedbackEl.innerText = "❌ Not quite! Let's look at it again.";
            feedbackEl.style.color = "#ff0000";
            document.getElementById('retryBtn').style.display = 'inline-block';
        }
    }

    function nextWord() {
        wordIndex++;
        playTurn();
    }

    function endGame() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('firstTryCount').innerText = lightningFirstTries;
        document.getElementById('endTotalWords').innerText = words.length;
    }
</script>
