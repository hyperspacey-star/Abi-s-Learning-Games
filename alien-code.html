<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Code Breaker</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #1a237e; color: white; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #00e5ff; font-size: 36px; margin-top: 10px; margin-bottom: 5px; text-shadow: 0 0 10px #00e5ff; }
        
        .card { background-color: #283593; padding: 25px; border-radius: 20px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border: 2px solid #3f51b5; }
        
        .story-text { font-size: 22px; color: #e8eaf6; margin-bottom: 20px; }
        
        button { padding: 15px 30px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin: 10px; transition: transform 0.1s; }
        button:active { transform: translateY(5px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-start { background-color: #00e5ff; color: #1a237e; box-shadow: 0 5px 0 #00b8d4; width: 80%; max-width: 300px; display: block; margin: 15px auto; }
        .btn-listen { background-color: #ff4081; color: white; box-shadow: 0 5px 0 #c2185b; font-size: 28px; width: 80%; max-width: 300px; }
        
        .input-area { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .alien-btn { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            font-size: 24px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid transparent;
            transition: all 0.1s;
        }
        
        .btn-high { background-color: #64dd17; color: #1b5e20; box-shadow: 0 8px 0 #33691e; }
        .btn-low { background-color: #ff9100; color: #e65100; box-shadow: 0 8px 0 #bf360c; }
        .btn-long { background-color: #d500f9; color: white; box-shadow: 0 8px 0 #6a0080; border-radius: 20px; width: 160px; }
        .btn-short { background-color: #00b0ff; color: #01579b; box-shadow: 0 8px 0 #005b4f; border-radius: 50%; width: 90px; height: 90px; margin-top: 15px;}

        /* Tracker */
        #answerDots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 40px;}
        .dot { width: 30px; height: 30px; border-radius: 50%; background-color: #3f51b5; border: 2px solid #7986cb; }
        .dot.filled { background-color: #00e5ff; border-color: white; box-shadow: 0 0 10px #00e5ff; }

        #feedback { font-size: 26px; font-weight: bold; margin-top: 15px; min-height: 40px; }
        
        .stats-area { display: flex; justify-content: space-around; background-color: #1a237e; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #3f51b5; }
        .stat-box { font-size: 20px; font-weight: bold; }
        #levelDisplay { color: #00e5ff; }
        #streakDisplay { color: #ffeb3b; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <h1>🛸 Alien Code Breaker</h1>
        <p class="story-text">Put on your headphones! The aliens are sending us signals. Use your ears to decode the pattern!</p>
        
        <button class="btn-start" onclick="initGame('frequency')">High / Low Tones</button>
        <button class="btn-start" onclick="initGame('duration')">Long / Short Tones</button>
    </div>

    <div class="card" id="gameScreen" style="display: none;">
        <div class="stats-area">
            <div class="stat-box" id="levelDisplay">⭐ Level: 1</div>
            <div class="stat-box" id="streakDisplay">🔥 Streak: 0</div>
        </div>
        
        <button class="btn-listen" id="listenBtn" onclick="playSequence()">▶️ Listen to Code</button>
        
        <div id="answerDots">
            </div>

        <div class="input-area" id="freqInputs" style="display: none;">
            <button class="alien-btn btn-high" onclick="handleInput('high')">⬆️ High</button>
            <button class="alien-btn btn-low" onclick="handleInput('low')">⬇️ Low</button>
        </div>

        <div class="input-area" id="durInputs" style="display: none;">
            <button class="alien-btn btn-long" onclick="handleInput('long')">➖ Long</button>
            <button class="alien-btn btn-short" onclick="handleInput('short')">▪️ Short</button>
        </div>

        <div id="feedback"></div>
        
        <button class="btn-start" id="nextBtn" style="display: none; background-color: #64dd17; color: #1b5e20;" onclick="generateSequence()">Next Code ➡️</button>
        <button class="btn-start" style="margin-top: 40px; background-color: #5c6bc0; color: white; box-shadow: 0 5px 0 #3949ab;" onclick="location.reload()">🏠 Change Mission</button>
    </div>

    <script>
        let audioCtx;
        
        let currentMode = '';
        let sequence = [];
        let playerInput = [];
        let isPlaying = false;
        
        // Progression Variables
        let currentLevel = 1;
        let streak = 0; 
        let levelProgress = 0; // Tracks progress within the current level
        let failedAttempts = 0; // Tracks how many times they failed the CURRENT code

        const HIGH_FREQ = 800;
        const LOW_FREQ = 300;
        const BASE_FREQ = 500; 
        const LONG_TIME = 600; 
        const SHORT_TIME = 200; 

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function getLevelSettings() {
            if (currentLevel === 1) return { notes: 2, gap: 600 }; // 2 notes, slow
            if (currentLevel === 2) return { notes: 3, gap: 600 }; // 3 notes, slow
            if (currentLevel === 3) return { notes: 3, gap: 200 }; // 3 notes, fast
            return { notes: 4, gap: 200 };                         // 4 notes, fast
        }

        function initGame(mode) {
            initAudio();
            currentMode = mode;
            currentLevel = 1;
            streak = 0;
            levelProgress = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            if (mode === 'frequency') {
                document.getElementById('freqInputs').style.display = 'flex';
            } else {
                document.getElementById('durInputs').style.display = 'flex';
            }
            
            generateSequence();
        }

        function generateSequence() {
            sequence = [];
            playerInput = [];
            failedAttempts = 0;
            
            let settings = getLevelSettings();
            
            for(let i = 0; i < settings.notes; i++) {
                if(currentMode === 'frequency') {
                    sequence.push(Math.random() > 0.5 ? 'high' : 'low');
                } else {
                    sequence.push(Math.random() > 0.5 ? 'long' : 'short');
                }
            }

            // Draw the correct number of dots for this level
            const dotsContainer = document.getElementById('answerDots');
            dotsContainer.innerHTML = '';
            for(let i = 0; i < settings.notes; i++) {
                dotsContainer.innerHTML += `<div class="dot" id="dot${i}"></div>`;
            }

            updateUIForNewTurn();
        }

        function updateUIForNewTurn() {
            document.getElementById('feedback').innerText = "";
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('listenBtn').disabled = false;
            
            for(let i = 0; i < sequence.length; i++) {
                document.getElementById('dot' + i).classList.remove('filled');
            }
            
            toggleInputButtons(false);
        }

        function toggleInputButtons(enable) {
            const buttons = document.querySelectorAll('.alien-btn');
            buttons.forEach(btn => btn.disabled = !enable);
        }

        function playTone(type) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine'; 
            
            let duration = 0;

            if (currentMode === 'frequency') {
                oscillator.frequency.value = (type === 'high') ? HIGH_FREQ : LOW_FREQ;
                duration = 400; 
            } else {
                oscillator.frequency.value = BASE_FREQ; 
                duration = (type === 'long') ? LONG_TIME : SHORT_TIME;
            }

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration / 1000));

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + (duration / 1000));
            
            return duration; 
        }

        async function playSequence() {
            if (isPlaying) return;
            isPlaying = true;
            initAudio(); 
            
            document.getElementById('listenBtn').disabled = true;
            playerInput = []; 
            
            for(let i = 0; i < sequence.length; i++) { 
                document.getElementById('dot' + i).classList.remove('filled'); 
            }
            toggleInputButtons(false);
            
            document.getElementById('feedback').innerText = "Listen closely...";
            document.getElementById('feedback').style.color = "#e8eaf6";

            await new Promise(r => setTimeout(r, 500));

            let settings = getLevelSettings();

            for (let i = 0; i < sequence.length; i++) {
                let note = sequence[i];
                let timePlayed = playTone(note);
                
                // Gap between notes depends on the level
                await new Promise(r => setTimeout(r, timePlayed + settings.gap));
            }

            document.getElementById('feedback').innerText = "Your turn!";
            document.getElementById('feedback').style.color = "#00e5ff";
            isPlaying = false;
            document.getElementById('listenBtn').disabled = false;
            toggleInputButtons(true);
        }

        function handleInput(type) {
            if (playerInput.length >= sequence.length || isPlaying) return;

            playTone(type);
            playerInput.push(type);
            
            document.getElementById('dot' + (playerInput.length - 1)).classList.add('filled');

            if (playerInput.length === sequence.length) {
                checkAnswer();
            }
        }

        function checkAnswer() {
            toggleInputButtons(false);
            let feedbackEl = document.getElementById('feedback');
            
            let isCorrect = true;
            for (let i = 0; i < sequence.length; i++) {
                if (playerInput[i] !== sequence[i]) {
                    isCorrect = false;
                    break;
                }
            }

            if (isCorrect) {
                feedbackEl.innerHTML = "✅ Signal Decoded!";
                feedbackEl.style.color = "#64dd17";
                
                // Only count towards streak/level progress if they got it right on the FIRST try
                if (failedAttempts === 0) {
                    streak++;
                    levelProgress++;
                }

                document.getElementById('streakDisplay').innerText = `🔥 Streak: ${streak}`;
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('listenBtn').disabled = true;

                // Level Up Logic
                if (levelProgress >= 3 && currentLevel < 4) {
                    currentLevel++;
                    levelProgress = 0;
                    feedbackEl.innerHTML = "🌟 LEVEL UP! 🌟";
                    document.getElementById('levelDisplay').innerText = `⭐ Level: ${currentLevel}`;
                }

            } else {
                failedAttempts++;
                levelProgress--; // Penalize progress
                
                // Level Down Logic (Gentle fallback so she doesn't get stuck and frustrated)
                if (levelProgress < -1 && currentLevel > 1) {
                    currentLevel--;
                    levelProgress = 0;
                    streak = 0;
                    document.getElementById('levelDisplay').innerText = `⭐ Level: ${currentLevel}`;
                    document.getElementById('streakDisplay').innerText = `🔥 Streak: 0`;
                    
                    feedbackEl.innerHTML = "Let's practice an easier one first.";
                    feedbackEl.style.color = "#ffeb3b";
                    
                    // Generate a new, easier sequence immediately
                    setTimeout(generateSequence, 2000);
                    return;
                }

                feedbackEl.innerHTML = "❌ Signal lost! Listen again and try to decode.";
                feedbackEl.style.color = "#ff4081";
                
                // Let her try the exact same code again
                playerInput = [];
                for(let i = 0; i < sequence.length; i++) {
                    document.getElementById('dot' + i).classList.remove('filled');
                }
                
                document.getElementById('listenBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
