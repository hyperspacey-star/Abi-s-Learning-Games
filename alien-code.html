<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Code Breaker</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #1a237e; color: white; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #00e5ff; font-size: 36px; margin-top: 10px; margin-bottom: 5px; text-shadow: 0 0 10px #00e5ff; }
        
        .card { background-color: #283593; padding: 25px; border-radius: 20px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border: 2px solid #3f51b5; }
        
        .story-text { font-size: 22px; color: #e8eaf6; margin-bottom: 20px; }
        
        /* Buttons */
        button { padding: 15px 30px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin: 10px; transition: transform 0.1s; }
        button:active { transform: translateY(5px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-start { background-color: #00e5ff; color: #1a237e; box-shadow: 0 5px 0 #00b8d4; width: 80%; max-width: 300px; display: block; margin: 15px auto; }
        .btn-listen { background-color: #ff4081; color: white; box-shadow: 0 5px 0 #c2185b; font-size: 28px; width: 80%; max-width: 300px; }
        
        /* Game Input Buttons */
        .input-area { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .alien-btn { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            font-size: 24px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid transparent;
            transition: all 0.1s;
        }
        
        /* Frequency Colors */
        .btn-high { background-color: #64dd17; color: #1b5e20; box-shadow: 0 8px 0 #33691e; }
        .btn-low { background-color: #ff9100; color: #e65100; box-shadow: 0 8px 0 #bf360c; }
        
        /* Duration Colors */
        .btn-long { background-color: #d500f9; color: white; box-shadow: 0 8px 0 #6a0080; border-radius: 20px; width: 160px; }
        .btn-short { background-color: #00b0ff; color: #01579b; box-shadow: 0 8px 0 #005b4f; border-radius: 50%; width: 90px; height: 90px; margin-top: 15px;}

        /* Active visual feedback during playback */
        .playing { filter: brightness(1.5); transform: scale(1.1); box-shadow: 0 0 20px white; border-color: white; }

        /* Tracker */
        #answerDots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 40px;}
        .dot { width: 30px; height: 30px; border-radius: 50%; background-color: #3f51b5; border: 2px solid #7986cb; }
        .dot.filled { background-color: #00e5ff; border-color: white; box-shadow: 0 0 10px #00e5ff; }

        #feedback { font-size: 28px; font-weight: bold; margin-top: 15px; min-height: 40px; }
        #streakDisplay { font-size: 24px; color: #ffeb3b; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <h1>🛸 Alien Code Breaker</h1>
        <p class="story-text">Put on your headphones! The friendly aliens are sending us signals. Can you repeat their secret codes back to them?</p>
        
        <button class="btn-start" onclick="initGame('frequency')">High / Low Tones</button>
        <button class="btn-start" onclick="initGame('duration')">Long / Short Tones</button>
    </div>

    <div class="card" id="gameScreen" style="display: none;">
        <div id="streakDisplay">⭐ Streak: 0</div>
        
        <button class="btn-listen" id="listenBtn" onclick="playSequence()">▶️ Listen to Code</button>
        
        <div id="answerDots">
            <div class="dot" id="dot0"></div>
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
        </div>

        <div class="input-area" id="freqInputs" style="display: none;">
            <button class="alien-btn btn-high" id="btn-high" onclick="handleInput('high')">⬆️ High</button>
            <button class="alien-btn btn-low" id="btn-low" onclick="handleInput('low')">⬇️ Low</button>
        </div>

        <div class="input-area" id="durInputs" style="display: none;">
            <button class="alien-btn btn-long" id="btn-long" onclick="handleInput('long')">➖ Long</button>
            <button class="alien-btn btn-short" id="btn-short" onclick="handleInput('short')">▪️ Short</button>
        </div>

        <div id="feedback"></div>
        
        <button class="btn-start" id="nextBtn" style="display: none; background-color: #64dd17; color: #1b5e20;" onclick="generateSequence()">Next Code ➡️</button>
        <button class="btn-start" style="margin-top: 40px; background-color: #5c6bc0; color: white; box-shadow: 0 5px 0 #3949ab;" onclick="location.reload()">🏠 Change Mission</button>
    </div>

    <script>
        // Web Audio API Setup
        let audioCtx;
        
        let currentMode = '';
        let sequence = [];
        let playerInput = [];
        let streak = 0;
        let isPlaying = false;

        // Settings for the tones
        const HIGH_FREQ = 800;
        const LOW_FREQ = 300;
        const BASE_FREQ = 500; // Used for duration mode so pitch stays the same
        const LONG_TIME = 600; // milliseconds
        const SHORT_TIME = 200; // milliseconds

        function initAudio() {
            if (!audioCtx) {
                // Compatible with iPad Safari
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function initGame(mode) {
            initAudio();
            currentMode = mode;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            if (mode === 'frequency') {
                document.getElementById('freqInputs').style.display = 'flex';
            } else {
                document.getElementById('durInputs').style.display = 'flex';
            }
            
            generateSequence();
        }

        function generateSequence() {
            sequence = [];
            playerInput = [];
            
            // Generate a 3-item sequence
            for(let i=0; i<3; i++) {
                if(currentMode === 'frequency') {
                    sequence.push(Math.random() > 0.5 ? 'high' : 'low');
                } else {
                    sequence.push(Math.random() > 0.5 ? 'long' : 'short');
                }
            }

            updateUIForNewTurn();
        }

        function updateUIForNewTurn() {
            document.getElementById('feedback').innerText = "";
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('listenBtn').disabled = false;
            
            // Reset dots
            for(let i=0; i<3; i++) {
                document.getElementById('dot' + i).classList.remove('filled');
            }
            
            toggleInputButtons(false); // Disable typing until they listen
        }

        function toggleInputButtons(enable) {
            const buttons = document.querySelectorAll('.alien-btn');
            buttons.forEach(btn => btn.disabled = !enable);
        }

        // The function that physically creates the sound using iPad hardware
        function playTone(type) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sine'; // Clean, pure tone
            
            let duration = 0;

            if (currentMode === 'frequency') {
                oscillator.frequency.value = (type === 'high') ? HIGH_FREQ : LOW_FREQ;
                duration = 400; // Fixed duration for pitch test
            } else {
                oscillator.frequency.value = BASE_FREQ; // Fixed pitch for duration test
                duration = (type === 'long') ? LONG_TIME : SHORT_TIME;
            }

            // Smooth fade out so it doesn't click in the headphones
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration / 1000));

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + (duration / 1000));
            
            return duration; // Return length so we know how long to wait before the next note
        }

        async function playSequence() {
            if (isPlaying) return;
            isPlaying = true;
            initAudio(); // Ensure audio is awake
            
            document.getElementById('listenBtn').disabled = true;
            playerInput = []; // Reset their answer if they listen again
            for(let i=0; i<3; i++) { document.getElementById('dot' + i).classList.remove('filled'); }
            toggleInputButtons(false);
            
            document.getElementById('feedback').innerText = "Listen closely...";
            document.getElementById('feedback').style.color = "#e8eaf6";

            // Wait a brief moment before starting
            await new Promise(r => setTimeout(r, 500));

            for (let i = 0; i < sequence.length; i++) {
                let note = sequence[i];
                
                // Light up the corresponding button visually
                let btn = document.getElementById('btn-' + note);
                if(btn) btn.classList.add('playing');
                
                let timePlayed = playTone(note);
                
                // Wait for the note to finish playing + a small gap between notes
                await new Promise(r => setTimeout(r, timePlayed + 200));
                
                if(btn) btn.classList.remove('playing');
            }

            document.getElementById('feedback').innerText = "Your turn!";
            document.getElementById('feedback').style.color = "#00e5ff";
            isPlaying = false;
            document.getElementById('listenBtn').disabled = false;
            toggleInputButtons(true);
        }

        function handleInput(type) {
            if (playerInput.length >= 3 || isPlaying) return;

            // Play the tone they tapped for immediate feedback
            playTone(type);
            
            playerInput.push(type);
            
            // Fill a dot
            document.getElementById('dot' + (playerInput.length - 1)).classList.add('filled');

            if (playerInput.length === 3) {
                checkAnswer();
            }
        }

        function checkAnswer() {
            toggleInputButtons(false);
            let feedbackEl = document.getElementById('feedback');
            
            let isCorrect = true;
            for (let i = 0; i < 3; i++) {
                if (playerInput[i] !== sequence[i]) {
                    isCorrect = false;
                    break;
                }
            }

            if (isCorrect) {
                feedbackEl.innerHTML = "✅ Signal Decoded!";
                feedbackEl.style.color = "#64dd17";
                streak++;
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('listenBtn').disabled = true;
            } else {
                feedbackEl.innerHTML = "❌ Signal lost! Try listening again.";
                feedbackEl.style.color = "#ff4081";
                streak = 0;
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                // Let them try again without generating a new code
            }
        }
    </script>
</body>
</html>
