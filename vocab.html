<style>
    body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #f0f8ff; text-align: center; }
    h1 { color: #ff4500; font-size: 36px; margin-bottom: 5px; }
    h2 { color: #1e90ff; margin-top: 0; }
    
    .card { background-color: white; padding: 30px; border-radius: 15px; margin: 20px auto; max-width: 700px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    
    button { background-color: #32cd32; color: white; padding: 20px 30px; font-size: 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 15px; }
    button:active { transform: translateY(2px); box-shadow: none; }
    .btn-blue { background-color: #1e90ff; }
    .btn-pink { background-color: #ff69b4; }
    .btn-audio { background-color: #ffa500; padding: 10px 20px; font-size: 20px; margin-bottom: 15px; } /* New audio button style */
    
    #wordDisplay { font-size: 60px; font-weight: bold; color: #4b0082; letter-spacing: 4px; min-height: 90px; margin: 20px 0; }
    #timerDisplay { font-size: 24px; color: #ff0000; font-weight: bold; min-height: 35px; }
    
    #typeArea { display: none; margin-top: 20px; }
    input[type="text"] { font-size: 30px; padding: 15px; text-align: center; width: 80%; border-radius: 10px; border: 3px solid #1e90ff; margin-bottom: 15px; }
    
    #feedback { font-size: 28px; font-weight: bold; margin-top: 20px; min-height: 40px; }
    .tracker { margin-top: 30px; font-size: 24px; color: #555; font-weight: bold; }
</style>

<div id="setupScreen" class="card">
    <h1>📝 Vocab Master</h1>
    <p style="font-size: 24px;">Ready for this week's spelling challenge?</p>
    <button class="btn-pink" onclick="startRound(1)">Start Round 1</button>
</div>

<div id="gameScreen" class="card" style="display: none;">
    <h2 id="roundTitle">Round 1: 10 Seconds</h2>
    <p id="instructions" style="font-size: 24px;">Look closely!</p>
    
    <div id="timerDisplay"></div>
    <div id="wordDisplay">READY?</div>
    
    <div id="typeArea">
        <button class="btn-audio" onclick="speakWord(currentWord, true)">🔊 Hear it again</button>
        <br>
        <input type="text" id="playerInput" placeholder="Type it here..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <br>
        <button class="btn-blue" onclick="checkWord()">Check Answer</button>
    </div>

    <div id="feedback"></div>

    <div class="tracker">
        <p>Word: <span id="currentWordNum">1</span> / <span id="totalWords">0</span></p>
    </div>
    
    <button id="nextBtn" style="display:none;" onclick="nextWord()">Next Word ➡️</button>
    <button id="retryBtn" class="btn-pink" style="display:none;" onclick="showWordTimer()">Study Again 👁️</button>
    <button id="startRound2Btn" class="btn-pink" style="display:none;" onclick="startRound(2)">Start Lightning Round ⚡</button>
</div>

<div id="endScreen" class="card" style="display: none;">
    <h1>🎉 AMAZING JOB! 🎉</h1>
    <h2>Lightning Round Stats:</h2>
    <p style="font-size: 24px;">You nailed <strong><span id="firstTryCount" style="color: #32cd32; font-size: 36px;">0</span></strong> out of <strong><span id="endTotalWords">0</span></strong> words on your VERY FIRST TRY!</p>
    <p style="font-size: 20px; color: #555;">Your brain is growing like crazy. Keep up the great work!</p>
    <button class="btn-blue" onclick="location.reload()">Play Again 🔄</button>
</div>

<script>
    // --- NEW SPEECH SYNTHESIS SETUP ---
    const synth = window.speechSynthesis;
    let voices = [];

    // Browsers load voices asynchronously, so we have to catch them when they are ready
    function populateVoiceList() {
        voices = synth.getVoices();
    }
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function speakWord(word, isRepeat = false) {
        // Cancel any currently playing speech to avoid overlapping
        synth.cancel();

        // The "Wrapper Trick": Put the word in a sentence so the browser enunciates it better
        let phraseToSpeak = isRepeat ? `Again, ${word}` : `The word is... ${word}`;
        
        const utterThis = new SpeechSynthesisUtterance(phraseToSpeak);
        
        // Find a high quality English voice (Prefer Google/Premium over basic OS ones)
        const englishVoices = voices.filter(v => v.lang.startsWith('en'));
        const premiumVoice = englishVoices.find(v => v.name.includes('Google') || v.name.includes('Premium'));
        
        if (premiumVoice) {
            utterThis.voice = premiumVoice;
        } else if (englishVoices.length > 0) {
            utterThis.voice = englishVoices[0]; // Fallback to first English voice
        }

        utterThis.rate = 0.75; // Slow it down for clarity (1 is default)
        utterThis.pitch = 1;
        
        synth.speak(utterThis);
    }
    // ----------------------------------

    let words = [
        "point", "sprout", "moisture", "shower", "cloud", 
        "south", "soil", "downpour", "noise", "proud", 
        "mouth", "scout", "spoil"
    ];

    let currentRound = 1;
    let wordIndex = 0;
    let lightningFirstTries = 0;
    let attemptsThisWord = 0;
    let currentWord = "";
    let countdownInterval;

    function startRound(roundNum) {
        currentRound = roundNum;
        wordIndex = 0;
        
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('totalWords').innerText = words.length;
        document.getElementById('roundTitle').innerText = currentRound === 1 ? "Round 1: 10 Second Study" : "⚡ Round 2: 5 Second Lightning! ⚡";
        document.getElementById('startRound2Btn').style.display = 'none';
        
        // Wake up the speech engine on first user click (browsers require this)
        let wakeUp = new SpeechSynthesisUtterance("");
        synth.speak(wakeUp);

        playTurn();
    }

    function playTurn() {
        currentWord = words[wordIndex];
        attemptsThisWord = 0;
        document.getElementById('currentWordNum').innerText = wordIndex + 1;
        document.getElementById('feedback').innerText = "";
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'none';
        
        showWordTimer();
        
        // Speak the word when it appears on screen
        speakWord(currentWord, false);
    }

    function showWordTimer() {
        let timeLeft = currentRound === 1 ? 10 : 5;
        
        document.getElementById('instructions').innerText = "Memorize the word...";
        document.getElementById('wordDisplay').innerText = currentWord;
        document.getElementById('wordDisplay').style.display = 'block';
        document.getElementById('typeArea').style.display = 'none';
        document.getElementById('feedback').innerText = "";
        document.getElementById('retryBtn').style.display = 'none';
        document.getElementById('playerInput').value = "";

        document.getElementById('timerDisplay').innerText = `⏳ ${timeLeft} seconds left!`;

        countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                document.getElementById('timerDisplay').innerText = `⏳ ${timeLeft} seconds left!`;
            } else {
                clearInterval(countdownInterval);
                document.getElementById('timerDisplay').innerText = "";
                document.getElementById('instructions').innerText = "Now type it!";
                document.getElementById('wordDisplay').style.display = 'none';
                document.getElementById('typeArea').style.display = 'block';
                document.getElementById('playerInput').focus();
            }
        }, 1000);
    }

    function checkWord() {
        let guess = document.getElementById('playerInput').value.trim();
        let feedbackEl = document.getElementById('feedback');
        attemptsThisWord++;
        
        document.getElementById('typeArea').style.display = 'none';
        
        if (guess.toLowerCase() === currentWord.toLowerCase()) {
            feedbackEl.innerText = "✅ Awesome! Correct!";
            feedbackEl.style.color = "#32cd32";
            
            if (currentRound === 2 && attemptsThisWord === 1) {
                lightningFirstTries++;
            }

            if (wordIndex < words.length - 1) {
                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                if (currentRound === 1) {
                    feedbackEl.innerText += " 🎉 Round 1 Complete!";
                    document.getElementById('startRound2Btn').style.display = 'inline-block';
                } else {
                    endGame();
                }
            }
        } else {
            feedbackEl.innerText = "❌ Not quite! Let's look at it again.";
            feedbackEl.style.color = "#ff0000";
            document.getElementById('retryBtn').style.display = 'inline-block';
        }
    }

    function nextWord() {
        wordIndex++;
        playTurn();
    }

    function endGame() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'block';
        document.getElementById('firstTryCount').innerText = lightningFirstTries;
        document.getElementById('endTotalWords').innerText = words.length;
    }
</script>
