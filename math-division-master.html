<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Step-by-Step Division Master</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #e8eaf6; text-align: center; margin: 0; }
        h1 { color: #3f51b5; font-size: 32px; margin-bottom: 5px; }
        h2 { color: #5c6bc0; margin-top: 0; font-size: 20px; }
        
        .card { background-color: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        
        #topBar { display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        #streakDisplay { color: #f57c00; }
        #levelDisplay { color: #43a047; }

        #promptText { font-size: 26px; color: #d84315; font-weight: bold; min-height: 40px; margin-bottom: 10px; }
        #equationDisplay { font-size: 48px; font-weight: bold; color: #1a237e; letter-spacing: 5px; min-height: 60px; background: #c5cae9; border-radius: 15px; padding: 10px; display: inline-block; min-width: 300px; margin-bottom: 15px;}
        
        /* Visualizer Area */
        #visualizer-container { display: flex; justify-content: center; align-items: center; min-height: 120px; margin: 10px 0; gap: 10px; flex-wrap: wrap; }
        .dot { width: 30px; height: 30px; background-color: #ff4081; border-radius: 50%; box-shadow: 0 3px 0 #c51162; margin: 2px; }
        .group-box { border: 3px dashed #3f51b5; border-radius: 10px; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; min-width: 60px; min-height: 60px; }

        /* Number Pad */
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 400px; margin: 10px auto; }
        .num-btn { background-color: #3f51b5; color: white; font-size: 36px; padding: 20px 0; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 6px 0 #283593; cursor: pointer; transition: transform 0.1s; }
        .num-btn:active { transform: translateY(6px); box-shadow: none; }
        .action-btn { background-color: #ff5252; box-shadow: 0 6px 0 #d32f2f; }
        
        .btn-start { background-color: #4caf50; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 6px 0 #388e3c; }
        .btn-start:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>

    <h1>➗ Step-by-Step Division</h1>
    <h2 id="modeTitle">Mastering the Math!</h2>

    <div class="card" id="startScreen">
        <p style="font-size: 22px; color: #555;">Learn division step-by-step! The better you get, the harder the puzzles become.</p>
        <button class="btn-start" onclick="startGame()">Start Playing! ▶️</button>
    </div>

    <div class="card" id="gameArea" style="display: none;">
        <div id="topBar">
            <div id="streakDisplay">⭐ Streak: 0</div>
            <div id="levelDisplay">🏆 Level: 1</div>
        </div>
        
        <div id="promptText">Read the instructions!</div>
        
        <div id="visualizer-container"></div>

        <div id="equationDisplay">_ ÷ _ = ?</div>

        <div id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn action-btn" onclick="clearInput()">C</button>
            <button class="num-btn" onclick="inputNumber(0)">0</button>
            <button class="num-btn" style="background-color: #4caf50; box-shadow: 0 6px 0 #388e3c;" onclick="checkAnswer()">ENTER</button>
        </div>
    </div>

    <script>
        let level = 1;
        let streak = 0;
        let divisor, quotient, dividend;
        
        let steps = [];
        let currentStepIndex = 0;
        let currentInput = "";

        // Audio Context for synthesized feedback
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playTone(type, freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.3); }
        function playVictory() {
            playTone('triangle', 523.25, 0.2);
            setTimeout(() => playTone('triangle', 659.25, 0.2), 200);
            setTimeout(() => playTone('triangle', 783.99, 0.4), 400);
        }

        function startGame() {
            initAudio();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            generateProblem();
        }

        function generateProblem() {
            currentInput = "";
            currentStepIndex = 0;
            steps = [];
            document.getElementById('visualizer-container').innerHTML = '';

            // Adaptive Leveling Logic
            if (level === 1) {
                document.getElementById('modeTitle').innerText = "Level 1: Visual Groups";
                divisor = Math.floor(Math.random() * 3) + 2; // 2 to 4
                quotient = Math.floor(Math.random() * 3) + 2; // 2 to 4
                dividend = divisor * quotient;
                setupLevel1();
            } else if (level === 2) {
                document.getElementById('modeTitle').innerText = "Level 2: Multiplication Connection";
                divisor = Math.floor(Math.random() * 6) + 3; // 3 to 8
                quotient = Math.floor(Math.random() * 6) + 3; // 3 to 8
                dividend = divisor * quotient;
                setupLevel2();
            } else if (level === 3) {
                document.getElementById('modeTitle').innerText = "Level 3: Repeated Subtraction";
                divisor = Math.floor(Math.random() * 3) + 3; // 3 to 5
                quotient = Math.floor(Math.random() * 3) + 3; // 3 to 5
                dividend = divisor * quotient;
                setupLevel3();
            } else if (level >= 4) {
                document.getElementById('modeTitle').innerText = "Level 4: Helper Grid Long Division";
                divisor = Math.floor(Math.random() * 3) + 2; // 2 to 4
                let qTens = Math.floor(Math.random() * 3) + 1; // 1 to 3
                let rTens = Math.floor(Math.random() * (divisor - 1)) + 1; // 1 to divisor-1
                let tensPart = (divisor * qTens) + rTens; // e.g., 3*2 + 1 = 7
                let qOnes = Math.floor(Math.random() * 5) + 2; // 2 to 6
                let onesPart = (rTens * 10) + (divisor * qOnes) - (rTens * 10); 
                dividend = (tensPart * 10) + (divisor * qOnes) - (rTens * 10); // Calculate true dividend
                quotient = (qTens * 10) + qOnes;
                dividend = divisor * quotient; // simplify ensuring clean math
                
                // Force a number that requires carrying a remainder to the ones column
                let tensDigit = Math.floor(dividend / 10);
                while(tensDigit % divisor === 0) {
                    divisor = Math.floor(Math.random() * 3) + 2;
                    quotient = Math.floor(Math.random() * 15) + 12;
                    dividend = divisor * quotient;
                    tensDigit = Math.floor(dividend / 10);
                }
                setupLevel4();
            }

            updateScreen();
        }

        function setupLevel1() {
            // Draw visual dots
            const vis = document.getElementById('visualizer-container');
            for(let i=0; i<dividend; i++) {
                let dot = document.createElement('div');
                dot.className = 'dot';
                vis.appendChild(dot);
            }

            steps = [
                { prompt: "Count the dots! How many are there in total?", expected: dividend, eqDisplay: `Total = _` },
                { prompt: `We want to divide them into ${divisor} equal groups. Type ${divisor}!`, expected: divisor, eqDisplay: `${dividend} ÷ _ = ?` },
                { prompt: `If you share them equally, how many dots go in each group?`, expected: quotient, eqDisplay: `${dividend} ÷ ${divisor} = _` }
            ];
        }

        function setupLevel2() {
            steps = [
                { prompt: `Think multiplication first! What times ${divisor} equals ${dividend}?`, expected: quotient, eqDisplay: `${divisor} × _ = ${dividend}` },
                { prompt: `Exactly! Since ${divisor} × ${quotient} = ${dividend}, what is ${dividend} ÷ ${divisor}?`, expected: quotient, eqDisplay: `${dividend} ÷ ${divisor} = _` }
            ];
        }

        function setupLevel3() {
            let currentAmount = dividend;
            steps = [];
            
            for(let i=0; i<quotient; i++) {
                let nextAmount = currentAmount - divisor;
                steps.push({ 
                    prompt: `Start at ${currentAmount}. Subtract ${divisor}. ${currentAmount} - ${divisor} = ?`, 
                    expected: nextAmount, 
                    eqDisplay: `${currentAmount} - ${divisor} = _` 
                });
                currentAmount = nextAmount;
            }
            steps.push({ prompt: `We reached 0! How many times did we subtract ${divisor}?`, expected: quotient, eqDisplay: `${dividend} ÷ ${divisor} = _` });
        }

        function setupLevel4() {
            let tensDigit = Math.floor(dividend / 10);
            let onesDigit = dividend % 10;
            let qTens = Math.floor(tensDigit / divisor);
            let rTens = tensDigit - (divisor * qTens);
            let newAmount = (rTens * 10) + onesDigit;
            let qOnes = Math.floor(newAmount / divisor);

            steps = [
                { prompt: `Divide the tens column: How many times does ${divisor} go into ${tensDigit}?`, expected: qTens, eqDisplay: `${tensDigit} ÷ ${divisor} = _ tens` },
                { prompt: `Multiply & Subtract: ${tensDigit} - (${divisor} × ${qTens}) = ?`, expected: rTens, eqDisplay: `${tensDigit} - ${divisor * qTens} = _ (Remainder)` },
                { prompt: `Bring down the ${onesDigit}. We now have ${newAmount}. How many times does ${divisor} go into ${newAmount}?`, expected: qOnes, eqDisplay: `${newAmount} ÷ ${divisor} = _ ones` },
                { prompt: `Put the tens and ones together! So ${dividend} ÷ ${divisor} is?`, expected: quotient, eqDisplay: `${dividend} ÷ ${divisor} = _` }
            ];
        }

        function updateScreen() {
            let stepInfo = steps[currentStepIndex];
            document.getElementById('promptText').innerText = stepInfo.prompt;
            
            let displayEq = stepInfo.eqDisplay.replace("_", currentInput === "" ? "_" : currentInput);
            document.getElementById('equationDisplay').innerText = displayEq;
        }

        function inputNumber(num) {
            currentInput += num.toString();
            updateScreen();
        }

        function clearInput() {
            currentInput = "";
            updateScreen();
        }

        function checkAnswer() {
            if (currentInput === "") return;
            
            let playerAnswer = parseInt(currentInput);
            let expectedAnswer = steps[currentStepIndex].expected;

            if (playerAnswer === expectedAnswer) {
                playDing();
                currentStepIndex++;
                currentInput = "";

                if (currentStepIndex >= steps.length) {
                    // Problem complete
                    streak++;
                    document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                    document.getElementById('promptText').innerText = "✅ Excellent Job!";
                    document.getElementById('equationDisplay').innerText = `${dividend} ÷ ${divisor} = ${quotient}`;
                    
                    checkLevelUp();
                    setTimeout(generateProblem, 2000); 
                } else {
                    updateScreen();
                }
            } else {
                playWrongBuzz();
                currentInput = "";
                document.getElementById('promptText').innerText = "❌ Not quite, try again!";
                updateScreen();
                streak = 0; 
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
            }
        }

        function checkLevelUp() {
            if (streak >= 3 && level < 4) {
                level++;
                streak = 0;
                playVictory();
                document.getElementById('levelDisplay').innerText = `🏆 Level: ${level}`;
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
            }
        }
    </script>
</body>
</html>
