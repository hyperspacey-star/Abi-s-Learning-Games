<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Sweet Shop</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #fff3e0; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #e64a19; font-size: 36px; margin-top: 10px; margin-bottom: 5px; }
        
        .card { background-color: white; padding: 20px; border-radius: 20px; margin: 10px auto; max-width: 900px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        
        .story-text { font-size: 26px; color: #424242; font-weight: bold; min-height: 80px; margin-bottom: 10px; }
        
        /* Bakery Display Area */
        #displayArea { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; min-height: 150px; }
        
        .box { 
            background-color: #f5f5f5; 
            border: 4px dashed #ffb74d; 
            border-radius: 15px; 
            padding: 10px; 
            min-width: 60px;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 5px;
            max-width: 120px;
        }

        .item { font-size: 30px; animation: popIn 0.3s ease-out; }
        .item.ghost { opacity: 0.3; filter: grayscale(50%); }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Input Area */
        .input-section { margin-top: 20px; }
        input[type="number"] { font-size: 40px; padding: 10px; text-align: center; width: 100px; border-radius: 15px; border: 4px solid #ff9800; background-color: #fff8e1; color: #e65100; font-weight: bold; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Buttons */
        button { padding: 15px 30px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 rgba(0,0,0,0.2); margin: 10px; transition: transform 0.1s; }
        button:active { transform: translateY(5px); box-shadow: none; }
        
        .btn-check { background-color: #4caf50; color: white; box-shadow: 0 5px 0 #2e7d32; }
        .btn-hint { background-color: #03a9f4; color: white; box-shadow: 0 5px 0 #0277bd; font-size: 20px; }
        .btn-next { background-color: #e91e63; color: white; box-shadow: 0 5px 0 #ad1457; display: none; }
        
        /* Mode Select Buttons */
        .btn-mult { background-color: #ab47bc; color: white; box-shadow: 0 5px 0 #7b1fa2; width: 80%; margin: 10px auto; display: block; }
        .btn-div { background-color: #26a69a; color: white; box-shadow: 0 5px 0 #00695c; width: 80%; margin: 10px auto; display: block; }

        #feedback { font-size: 30px; font-weight: bold; margin-top: 15px; min-height: 40px; }
        #streakDisplay { font-size: 24px; color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <h1>🧁 Abi's Sweet Shop</h1>
        <p style="font-size: 24px;">What job are we doing today?</p>
        <button class="btn-mult" onclick="startGame('mult')">📦 Packing Boxes (Multiplication)</button>
        <button class="btn-div" onclick="startGame('div')">🤝 Sharing Treats (Division)</button>
    </div>

    <div class="card" id="gameScreen" style="display: none;">
        <div id="streakDisplay">🔥 Streak: 0</div>
        
        <div id="story" class="story-text"></div>
        
        <div id="displayArea"></div>
        
        <div class="input-section" id="inputArea">
            <input type="number" id="answerInput" pattern="[0-9]*" inputmode="numeric" placeholder="?">
            <br>
            <button class="btn-hint" id="hintBtn" onclick="showHint()">👀 Show Me</button>
            <button class="btn-check" id="checkBtn" onclick="checkAnswer()">Pack It! 🚚</button>
        </div>

        <div id="feedback"></div>
        <button class="btn-next" id="nextBtn" onclick="generateProblem()">Next Order ➡️</button>
        <button class="btn-hint" style="background-color: #9e9e9e; box-shadow: 0 5px 0 #616161; margin-top: 30px;" onclick="location.reload()">🏠 Change Job</button>
    </div>

    <script>
        const treats = ["🍩", "🍪", "🧁", "🍬", "🍫", "🍓"];
        let currentMode = '';
        let currentTreat = '';
        let numBoxes = 0;
        let itemsPerBox = 0;
        let totalItems = 0;
        let correctAnswer = 0;
        let streak = 0;

        function startGame(mode) {
            currentMode = mode;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateProblem();
        }

        function generateProblem() {
            // Reset UI
            document.getElementById('answerInput').value = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('checkBtn').style.display = 'inline-block';
            document.getElementById('hintBtn').style.display = 'inline-block';
            document.getElementById('displayArea').innerHTML = "";
            
            // Randomize numbers (focusing on 1-12)
            // Weight it slightly so it doesn't do 12x12 too often, making it visually overwhelming
            let num1 = Math.floor(Math.random() * 10) + 2; // 2 to 11
            let num2 = Math.floor(Math.random() * 10) + 2; // 2 to 11
            
            // Occasionally throw in a 1 or 12
            if (Math.random() > 0.8) num1 = 12;
            if (Math.random() > 0.9) num1 = 1;

            currentTreat = treats[Math.floor(Math.random() * treats.length)];
            
            numBoxes = num1;
            itemsPerBox = num2;
            totalItems = numBoxes * itemsPerBox;

            let storyText = "";

            if (currentMode === 'mult') {
                correctAnswer = totalItems;
                storyText = `We need ${numBoxes} boxes. Put ${itemsPerBox} ${currentTreat} in each box.<br>How many ${currentTreat} do we need TOTAL?`;
                drawEmptyBoxes();
            } else {
                correctAnswer = itemsPerBox;
                storyText = `We baked ${totalItems} ${currentTreat}. Share them equally into ${numBoxes} boxes.<br>How many ${currentTreat} go in EACH box?`;
                drawDivisionStart();
            }

            document.getElementById('story').innerHTML = storyText;
        }

        function drawEmptyBoxes() {
            const display = document.getElementById('displayArea');
            for (let i = 0; i < numBoxes; i++) {
                let box = document.createElement('div');
                box.className = 'box';
                box.id = 'box' + i;
                display.appendChild(box);
            }
        }

        function drawDivisionStart() {
            const display = document.getElementById('displayArea');
            
            // Draw a big "pile" box at the top for the total items
            let pile = document.createElement('div');
            pile.className = 'box';
            pile.style.width = '100%';
            pile.style.maxWidth = '100%';
            pile.style.borderColor = '#9c27b0';
            pile.id = 'pile';
            
            // Fill the pile with the total items
            for (let i = 0; i < totalItems; i++) {
                let item = document.createElement('span');
                item.className = 'item';
                item.innerText = currentTreat;
                pile.appendChild(item);
            }
            display.appendChild(pile);

            // Draw the empty destination boxes below
            let lowerArea = document.createElement('div');
            lowerArea.style.display = 'flex';
            lowerArea.style.flexWrap = 'wrap';
            lowerArea.style.justifyContent = 'center';
            lowerArea.style.gap = '15px';
            lowerArea.style.width = '100%';
            lowerArea.style.marginTop = '15px';

            for (let i = 0; i < numBoxes; i++) {
                let box = document.createElement('div');
                box.className = 'box';
                box.id = 'box' + i;
                lowerArea.appendChild(box);
            }
            display.appendChild(lowerArea);
        }

        function showHint() {
            document.getElementById('hintBtn').style.display = 'none';
            
            if (currentMode === 'mult') {
                // Fill boxes with transparent ghost items
                for (let i = 0; i < numBoxes; i++) {
                    let box = document.getElementById('box' + i);
                    box.innerHTML = ""; // clear just in case
                    for (let j = 0; j < itemsPerBox; j++) {
                        box.innerHTML += `<span class="item ghost">${currentTreat}</span>`;
                    }
                }
            } else {
                // Move ghost items from pile to boxes
                document.getElementById('pile').innerHTML = "";
                for (let i = 0; i < numBoxes; i++) {
                    let box = document.getElementById('box' + i);
                    box.innerHTML = ""; 
                    for (let j = 0; j < itemsPerBox; j++) {
                        box.innerHTML += `<span class="item ghost">${currentTreat}</span>`;
                    }
                }
            }
        }

        function checkAnswer() {
            let guess = parseInt(document.getElementById('answerInput').value);
            let feedbackEl = document.getElementById('feedback');

            if (isNaN(guess)) return;

            if (guess === correctAnswer) {
                feedbackEl.innerHTML = "✅ Perfect Packing!";
                feedbackEl.style.color = "#4caf50";
                streak++;
                document.getElementById('streakDisplay').innerText = `🔥 Streak: ${streak}`;
                
                document.getElementById('checkBtn').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'inline-block';
                
                showSuccessAnimation();
            } else {
                feedbackEl.innerHTML = "❌ Not quite! Try using the 'Show Me' button to count.";
                feedbackEl.style.color = "#f44336";
                streak = 0;
                document.getElementById('streakDisplay').innerText = `🔥 Streak: ${streak}`;
            }
        }

        function showSuccessAnimation() {
            // Make all items solid and bouncy
            if (currentMode === 'div') {
                document.getElementById('pile').style.display = 'none';
            }

            for (let i = 0; i < numBoxes; i++) {
                let box = document.getElementById('box' + i);
                box.innerHTML = ""; 
                for (let j = 0; j < itemsPerBox; j++) {
                    box.innerHTML += `<span class="item">${currentTreat}</span>`;
                }
            }
        }
    </script>
</body>
</html>
