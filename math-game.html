<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Master: Number Line Ninja!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f3e5f5;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 650px;
            margin: 0 auto;
            padding: 30px;
            border: 5px solid #9c27b0;
        }
        h1 {
            color: #7b1fa2;
            margin-bottom: 5px;
        }
        #stats-bar {
            display: flex;
            justify-content: space-between;
            background-color: #e1bee7;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1em;
            color: #4a148c;
        }
        #badge-container {
            font-size: 1.8em;
            min-height: 40px;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }
        #question-text {
            font-size: 1.4em;
            margin: 20px 0;
            color: #2c3e50;
        }
        canvas {
            background-color: #fafafa;
            border-radius: 10px;
            margin: 10px 0;
            border: 1px dashed #bdbdbd;
        }
        .options-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            background-color: #9c27b0;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 25px;
            font-size: 1.4em;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #7b1fa2;
            transform: scale(1.05);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-hint {
            background-color: #1e90ff; /* Blue styling from your vocab game */
            font-size: 1.2em;
            padding: 10px 20px;
            margin-bottom: 15px;
            display: none;
        }
        .btn-hint:hover {
            background-color: #0073e6;
        }
        #feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            min-height: 40px;
        }
        .correct { color: #2e7d32; animation: pop 0.5s ease-in-out; }
        .incorrect { color: #c62828; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🚀 Fraction Master! 🚀</h1>
    <div id="badge-container"></div>
    <div id="stats-bar">
        <span id="level-indicator">Level: 1</span>
        <span id="streak-indicator">🔥 Streak: 0</span>
    </div>
    
    <div id="question-text">Loading question...</div>
    
    <button id="showMeBtn" class="btn-hint" onclick="showHint()">🔍 Show Me!</button>
    
    <canvas id="mathCanvas" width="500" height="150" style="display: none;"></canvas>
    <div id="options" class="options-container"></div>
    <div id="feedback"></div>
</div>

<script>
    const canvas = document.getElementById('mathCanvas');
    const ctx = canvas.getContext('2d');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options');
    const feedbackText = document.getElementById('feedback');
    const levelIndicator = document.getElementById('level-indicator');
    const streakIndicator = document.getElementById('streak-indicator');
    const badgeContainer = document.getElementById('badge-container');
    const showMeBtn = document.getElementById('showMeBtn');

    let currentDifficulty = 1;
    let correctAnswer = "";
    let streak = 0;
    let totalCorrect = 0;
    const maxLevel = 7;
    let currentLevelOptions = []; // Stores options to draw hints

    const badges = [
        { threshold: 3, icon: '🌟', title: 'Star Scholar' },
        { threshold: 7, icon: '🎨', title: 'Math Artist' },
        { threshold: 12, icon: '🦄', title: 'Fraction Unicorn' },
        { threshold: 18, icon: '🚀', title: 'Space Explorer' },
        { threshold: 25, icon: '👑', title: 'Math Queen' }
    ];

    function updateStats() {
        levelIndicator.innerText = `Level: ${currentDifficulty}`;
        streakIndicator.innerText = `🔥 Streak: ${streak}`;
        let earnedBadges = badges.filter(b => totalCorrect >= b.threshold).map(b => b.icon).join(' ');
        badgeContainer.innerText = earnedBadges || "Get 3 right to earn your first badge!";
    }

    function clearCanvas() {
        canvas.height = 150; // Reset height
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        optionsContainer.className = "options-container";
        showMeBtn.style.display = 'none';
    }

    function drawCircle(total, shaded) {
        canvas.style.display = 'inline-block';
        const cx = canvas.width / 2, cy = canvas.height / 2, radius = 60;
        for (let i = 0; i < total; i++) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, i * (2 * Math.PI / total), (i + 1) * (2 * Math.PI / total));
            ctx.fillStyle = i < shaded ? '#ba68c8' : '#e0e0e0';
            ctx.fill();
            ctx.stroke();
            ctx.closePath();
        }
    }

    function drawNumberLine(wholes, denominator, targetNumerator) {
        canvas.style.display = 'inline-block';
        const padding = 40;
        const width = canvas.width - (padding * 2);
        const startY = canvas.height / 2;
        
        ctx.beginPath();
        ctx.moveTo(padding, startY);
        ctx.lineTo(padding + width, startY);
        ctx.lineWidth = 3;
        ctx.stroke();
        
        const totalTicks = wholes * denominator;
        const tickSpacing = width / totalTicks;

        for (let i = 0; i <= totalTicks; i++) {
            const x = padding + (i * tickSpacing);
            ctx.beginPath();
            ctx.moveTo(x, startY - 10);
            
            if (i % denominator === 0) {
                ctx.lineTo(x, startY + 15);
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = '#000';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(i / denominator, x, startY + 35);
            } else {
                ctx.lineTo(x, startY + 10);
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            if (i === targetNumerator) {
                ctx.beginPath();
                ctx.arc(x, startY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ff1744'; 
                ctx.fill();
                ctx.font = '24px Arial';
                ctx.fillText('⭐', x, startY - 20);
            }
        }
    }

    // New Function: Draws 4 stacked number lines to visualize the equivalence
    function showHint() {
        showMeBtn.style.display = 'none';
        canvas.style.display = 'inline-block';
        canvas.height = 320; // Make canvas taller for 4 lines
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const padding = 60;
        const width = canvas.width - (padding * 2);
        const startYBase = 40;
        const spacing = 75;

        currentLevelOptions.forEach((fracStr, index) => {
            let [num, den] = fracStr.split('/').map(Number);
            let startY = startYBase + (index * spacing);

            // Draw line
            ctx.beginPath();
            ctx.moveTo(padding, startY);
            ctx.lineTo(padding + width, startY);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#333';
            ctx.stroke();

            // Label fraction
            ctx.fillStyle = '#000';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(fracStr, padding - 15, startY + 6);

            // Draw ticks and marks
            const tickSpacing = width / den;
            for(let i = 0; i <= den; i++) {
                let x = padding + (i * tickSpacing);
                ctx.beginPath();
                ctx.moveTo(x, startY - 8);
                ctx.lineTo(x, startY + 8);
                ctx.lineWidth = (i === 0 || i === den) ? 3 : 1.5;
                ctx.stroke();

                if(i === 0) { ctx.fillText("0", x + 10, startY + 25); }
                if(i === den) { ctx.fillText("1", x + 10, startY + 25); }
            }

            // Place purple dot at the target numerator
            let targetX = padding + (num * tickSpacing);
            ctx.beginPath();
            ctx.arc(targetX, startY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#9c27b0';
            ctx.fill();
        });
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateQuestion() {
        clearCanvas();
        feedbackText.innerText = "";
        optionsContainer.innerHTML = "";
        updateStats();

        let qType = currentDifficulty > maxLevel ? Math.floor(Math.random() * maxLevel) + 1 : currentDifficulty;
        let totalParts, shadedParts, numerator, denominator;

        if (qType === 1 || qType === 2) {
            totalParts = Math.floor(Math.random() * 4) + 2; 
            shadedParts = Math.floor(Math.random() * (totalParts - 1)) + 1;
            drawCircle(totalParts, shadedParts);
            questionText.innerText = "What fraction of the circle is shaded purple?";
            correctAnswer = `${shadedParts}/${totalParts}`;
            let answers = [correctAnswer, `1/${totalParts}`, `${shadedParts}/${totalParts + 1}`, `${totalParts}/${shadedParts}`];
            createButtons([...new Set(answers)].slice(0, 3));
            
        } else if (qType === 3) {
            totalParts = Math.floor(Math.random() * 5) + 3;
            drawCircle(totalParts, 0); 
            questionText.innerText = `This shape has ${totalParts} equal parts. What unit fraction names ONE of those parts?`;
            correctAnswer = `1/${totalParts}`;
            let answers = [correctAnswer, `${totalParts}/1`, `1/${totalParts-1}`, `2/${totalParts}`];
            createButtons([...new Set(answers)].slice(0, 3));

        } else if (qType === 4) {
            totalParts = Math.floor(Math.random() * 4) + 3; 
            let unshadedParts = totalParts - 1;
            let isTrick = Math.random() > 0.5;
            let claimed = isTrick ? `1/${unshadedParts}` : `1/${totalParts}`;
            questionText.innerHTML = `Trang has a circle. 1 part is shaded, and ${unshadedParts} parts are not.<br>Trang says her fraction is <b>${claimed}</b>. Is she correct?`;
            correctAnswer = isTrick ? "False" : "True";
            createButtons(["True", "False"]);

        } else if (qType === 5) {
            denominator = Math.floor(Math.random() * 5) + 3; 
            numerator = Math.floor(Math.random() * (denominator - 1)) + 1; 
            drawNumberLine(1, denominator, numerator);
            questionText.innerText = "What fraction is marked by the star on the number line?";
            correctAnswer = `${numerator}/${denominator}`;
            let answers = [correctAnswer, `${numerator}/${denominator+1}`, `${numerator-1}/${denominator}`, `${denominator}/${numerator}`];
            createButtons([...new Set(answers)].slice(0, 3));

        } else if (qType === 6) {
            denominator = Math.floor(Math.random() * 3) + 2; 
            let wholes = Math.floor(Math.random() * 2) + 2; 
            numerator = denominator + Math.floor(Math.random() * (denominator * (wholes - 1))); 
            
            drawNumberLine(wholes, denominator, numerator);
            questionText.innerText = "What fraction is marked by the star? (Hint: It's greater than 1!)";
            correctAnswer = `${numerator}/${denominator}`;
            
            let wrong1 = `${numerator}/${denominator * wholes}`; 
            let wrong2 = `${numerator - denominator}/${denominator}`; 
            let wrong3 = `${numerator + 1}/${denominator}`;
            let answers = [correctAnswer, wrong1, wrong2, wrong3];
            createButtons([...new Set(answers)].slice(0, 4));

        } else if (qType === 7) {
            optionsContainer.className = "grid-options"; 
            showMeBtn.style.display = 'inline-block'; // Show the hint button!
            
            let sets = [
                { eq: ["1/2", "2/4", "3/6", "4/8"], wrong: ["1/3", "2/3", "1/4"] },
                { eq: ["1", "2/2", "3/3", "4/4"], wrong: ["1/2", "4/3", "0/4"] },
                { eq: ["1/3", "2/6", "3/9"], wrong: ["1/4", "2/5", "3/8"] }
            ];
            
            let chosenSet = sets[Math.floor(Math.random() * sets.length)];
            let correctEquivalents = shuffleArray(chosenSet.eq).slice(0, 3);
            let outlier = chosenSet.wrong[Math.floor(Math.random() * chosenSet.wrong.length)];
            
            questionText.innerHTML = "<b>Which One Doesn't Belong?</b><br>Three of these mean the exact same thing. Find the imposter!";
            correctAnswer = outlier;
            
            currentLevelOptions = shuffleArray([...correctEquivalents, outlier]);
            createButtons(currentLevelOptions);
        }
    }

    function createButtons(answersArray) {
        answersArray.forEach(ans => {
            const btn = document.createElement('button');
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(ans);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        const buttons = document.querySelectorAll('#options button');
        buttons.forEach(btn => btn.disabled = true);
        showMeBtn.style.display = 'none'; // Hide hint button on answer

        const praiseWords = ["Awesome!", "Brilliant!", "You nailed it!", "Superstar!", "Math Genius!"];
        const randomPraise = praiseWords[Math.floor(Math.random() * praiseWords.length)];

        if (selected === correctAnswer) {
            streak++;
            totalCorrect++;
            feedbackText.innerHTML = `🎉 ${randomPraise} 🎉`;
            feedbackText.className = "correct";
            
            if (currentDifficulty < maxLevel && streak % 2 === 0) {
                currentDifficulty++; 
            }
            setTimeout(generateQuestion, 2500);
        } else {
            streak = 0; 
            feedbackText.innerHTML = `Oops! The imposter was <b>${correctAnswer}</b>. You'll get the next one!`;
            feedbackText.className = "incorrect";
            updateStats(); 
            setTimeout(generateQuestion, 4000);
        }
    }

    // Start game
    generateQuestion();
</script>

</body>
</html>
