<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Area Architect</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #e0f7fa; text-align: center; margin: 0; }
        h1 { color: #00838f; font-size: 32px; margin-bottom: 5px; }
        h2 { color: #00bcd4; margin-top: 0; font-size: 20px; }
        
        .card { background-color: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        
        /* Grid Visualizer */
        #visualizer-container { display: flex; justify-content: center; align-items: center; min-height: 250px; margin: 20px 0; }
        #grid-board { display: grid; gap: 2px; background-color: #ccc; border: 4px solid #00838f; padding: 2px; }
        .grid-cell { background-color: #b2ebf2; width: 35px; height: 35px; border-radius: 4px; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .grid-cell.missing { background-color: #ffcc80; } /* For missing side mode */

        /* Scaffolding Text */
        #promptText { font-size: 28px; color: #ff6f00; font-weight: bold; min-height: 40px; margin-bottom: 10px; }
        #equationDisplay { font-size: 48px; font-weight: bold; color: #283593; letter-spacing: 5px; min-height: 60px; background: #e8eaf6; border-radius: 15px; padding: 10px; display: inline-block; min-width: 300px;}
        
        /* Number Pad */
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 400px; margin: 30px auto 10px auto; }
        .num-btn { background-color: #00bcd4; color: white; font-size: 36px; padding: 20px 0; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 6px 0 #00838f; cursor: pointer; transition: transform 0.1s; }
        .num-btn:active { transform: translateY(6px); box-shadow: none; }
        .action-btn { background-color: #ff5252; box-shadow: 0 6px 0 #d32f2f; }
        
        /* Menu Buttons */
        .mode-btn { background-color: #4caf50; color: white; padding: 15px 20px; font-size: 20px; border: none; border-radius: 10px; margin: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #388e3c; }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        
        #streakDisplay { font-size: 24px; font-weight: bold; color: #f57c00; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>📐 Area & Perimeter Architect</h1>
    <h2 id="modeTitle">Select a Worksheet Mode!</h2>

    <div class="card" id="menuArea">
        <button class="mode-btn" onclick="startGame('area')">Area (Length × Width)</button>
        <button class="mode-btn" onclick="startGame('perimeter')" style="background-color: #9c27b0; box-shadow: 0 4px 0 #7b1fa2;">Perimeter (Adding Sides)</button>
        <button class="mode-btn" onclick="startGame('missing')" style="background-color: #ff9800; box-shadow: 0 4px 0 #f57c00;">Find Missing Side</button>
    </div>

    <div class="card" id="gameArea" style="display: none;">
        <div id="streakDisplay">⭐ Streak: 0</div>
        
        <div id="promptText">Count the top edge!</div>
        
        <div id="visualizer-container">
            <div id="grid-board"></div>
        </div>

        <div id="equationDisplay">_ × _ = ?</div>

        <div id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn action-btn" onclick="clearInput()">C</button>
            <button class="num-btn" onclick="inputNumber(0)">0</button>
            <button class="num-btn" style="background-color: #4caf50; box-shadow: 0 6px 0 #388e3c;" onclick="checkAnswer()">ENTER</button>
        </div>
    </div>

    <script>
        let currentMode = 'area';
        let width = 0;
        let height = 0;
        let area = 0;
        let perimeter = 0;
        
        let steps = [];
        let currentStepIndex = 0;
        let currentInput = "";
        let streak = 0;

        // Audio Context for synthesized feedback
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playTone(type, freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.3); }
        function playVictory() {
            playTone('triangle', 523.25, 0.2);
            setTimeout(() => playTone('triangle', 659.25, 0.2), 200);
            setTimeout(() => playTone('triangle', 783.99, 0.4), 400);
        }

        function startGame(mode) {
            initAudio();
            currentMode = mode;
            streak = 0;
            document.getElementById('streakDisplay').innerText = `⭐ Streak: 0`;
            document.getElementById('menuArea').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            
            if(mode === 'area') document.getElementById('modeTitle').innerText = "Worksheet: Finding Area";
            if(mode === 'perimeter') document.getElementById('modeTitle').innerText = "Worksheet: Finding Perimeter";
            if(mode === 'missing') document.getElementById('modeTitle').innerText = "Worksheet: Missing Side";

            generateProblem();
        }

        function generateProblem() {
            // Generate random dimensions between 2 and 9
            width = Math.floor(Math.random() * 8) + 2;
            height = Math.floor(Math.random() * 8) + 2;
            area = width * height;
            perimeter = (width * 2) + (height * 2);

            drawGrid();
            setupScaffolding();
        }

        function drawGrid() {
            const board = document.getElementById('grid-board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${width}, 35px)`;
            board.style.gridTemplateRows = `repeat(${height}, 35px)`;

            for (let i = 0; i < area; i++) {
                let cell = document.createElement('div');
                cell.className = 'grid-cell';
                if (currentMode === 'missing') {
                    cell.className = 'grid-cell missing';
                }
                board.appendChild(cell);
            }
        }

        // This function builds the exact step-by-step logic you requested
        function setupScaffolding() {
            currentStepIndex = 0;
            currentInput = "";
            steps = [];

            if (currentMode === 'area') {
                steps = [
                    { prompt: "Count the blocks along the TOP edge.", expected: width, eqDisplay: `_ × _ = ?` },
                    { prompt: "Count the blocks along the SIDE edge.", expected: height, eqDisplay: `${width} × _ = ?` },
                    { prompt: "Now multiply to find the total Area!", expected: area, eqDisplay: `${width} × ${height} = _` }
                ];
            } else if (currentMode === 'perimeter') {
                steps = [
                    { prompt: "How long is the TOP edge?", expected: width, eqDisplay: `_ + _ + _ + _ = ?` },
                    { prompt: "How long is the SIDE edge?", expected: height, eqDisplay: `${width} + _ + ${width} + _ = ?` },
                    { prompt: "Add all four outside edges for the Perimeter!", expected: perimeter, eqDisplay: `${width} + ${height} + ${width} + ${height} = _` }
                ];
            } else if (currentMode === 'missing') {
                steps = [
                    { prompt: `The total AREA is ${area}. Type ${area} to set up the equation!`, expected: area, eqDisplay: `_ = ${height} × ?` },
                    { prompt: `The side is ${height}. What is the missing top edge?`, expected: width, eqDisplay: `${area} = ${height} × _` }
                ];
            }

            updateScreen();
        }

        function updateScreen() {
            let stepInfo = steps[currentStepIndex];
            document.getElementById('promptText').innerText = stepInfo.prompt;
            
            // Show the user's current typed input in the equation gap
            let displayEq = stepInfo.eqDisplay.replace("_", currentInput === "" ? "_" : currentInput);
            document.getElementById('equationDisplay').innerText = displayEq;
        }

        function inputNumber(num) {
            currentInput += num.toString();
            updateScreen();
        }

        function clearInput() {
            currentInput = "";
            updateScreen();
        }

        function checkAnswer() {
            if (currentInput === "") return;
            
            let playerAnswer = parseInt(currentInput);
            let expectedAnswer = steps[currentStepIndex].expected;

            if (playerAnswer === expectedAnswer) {
                playDing();
                currentStepIndex++;
                currentInput = "";

                if (currentStepIndex >= steps.length) {
                    // Problem complete!
                    playVictory();
                    streak++;
                    document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                    document.getElementById('promptText').innerText = "✅ Excellent Job!";
                    
                    if(currentMode === 'area') document.getElementById('equationDisplay').innerText = `${width} × ${height} = ${area}`;
                    if(currentMode === 'perimeter') document.getElementById('equationDisplay').innerText = `${width} + ${height} + ${width} + ${height} = ${perimeter}`;
                    if(currentMode === 'missing') document.getElementById('equationDisplay').innerText = `${area} = ${height} × ${width}`;

                    setTimeout(generateProblem, 2000); // Load next problem after 2 seconds
                } else {
                    updateScreen();
                }
            } else {
                playWrongBuzz();
                currentInput = "";
                document.getElementById('promptText').innerText = "❌ Not quite, try counting again!";
                updateScreen();
                streak = 0; // Reset streak on error
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
            }
        }
    </script>

</body>
</html>
