<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Pattern Decoder</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', Arial, sans-serif; 
            padding: 20px; 
            background-color: #f0f8ff; 
            text-align: center; 
            touch-action: manipulation;
        }
        h1 { color: #ff4500; font-size: 36px; margin-bottom: 5px; }
        h2 { color: #1e90ff; margin-top: 0; }
        
        .card { 
            background-color: white; 
            padding: 30px; 
            border-radius: 15px; 
            margin: 20px auto; 
            max-width: 700px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
        }
        
        #sequenceDisplay {
            font-size: 42px;
            color: #333;
            letter-spacing: 5px;
            margin: 20px 0;
            padding: 20px;
            background-color: #e8f5e9;
            border-radius: 10px;
            border: 3px dashed #4caf50;
            font-weight: bold;
        }

        #answerBox {
            font-size: 40px;
            color: #4b0082;
            font-weight: bold;
            min-height: 50px;
            margin: 20px auto;
            width: 150px;
            border-bottom: 4px solid #1e90ff;
        }

        /* iPad Friendly Number Pad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 350px;
            margin: 0 auto;
        }

        .num-btn {
            background-color: #1e90ff;
            color: white;
            font-size: 32px;
            padding: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #0d47a1;
        }

        .num-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .action-btn { background-color: #32cd32; box-shadow: 0 4px 0 #1b5e20; }
        .clear-btn { background-color: #ff5252; box-shadow: 0 4px 0 #b71c1c; }

        /* Rule Buttons */
        #ruleArea { display: none; margin-top: 20px; }
        .rule-btn {
            display: block;
            width: 100%;
            background-color: #9c27b0;
            color: white;
            font-size: 24px;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #4a148c;
        }
        .rule-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Hint System */
        #hintBtn {
            background-color: #ffa500;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #e65100;
            margin-top: 20px;
            display: none; /* Hidden by default */
        }
        
        #hintDisplay {
            font-size: 22px;
            color: #e65100;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        #feedback { 
            font-size: 28px; 
            font-weight: bold; 
            margin-top: 20px; 
            min-height: 40px; 
        }

        #nextBtn {
            background-color: #ff1493;
            color: white;
            font-size: 24px;
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #c71585;
            margin-top: 20px;
            display: none;
        }

        .progress {
            font-size: 20px;
            color: #555;
            font-weight: bold;
            margin-top: 20px;
        }
        
        #startScreen, #endScreen { display: none; }
    </style>
</head>
<body>

    <div id="startScreen" class="card" style="display: block;">
        <h1>🕵️‍♀️ Abi's Pattern Decoder 🕵️‍♀️</h1>
        <h2>Find the missing number, then crack the secret rule!</h2>
        <button class="num-btn action-btn" style="width: 100%; margin-top: 30px;" onclick="startGame()">Start Decoding!</button>
    </div>

    <div id="gameArea" class="card" style="display: none;">
        <h2>Code <span id="currentLevelNum">1</span></h2>
        
        <div id="sequenceDisplay">Loading...</div>
        
        <div id="numberPhase">
            <div id="answerBox"></div>
            <div id="numpadArea" class="numpad">
                <button class="num-btn" onclick="addNumber(1)">1</button>
                <button class="num-btn" onclick="addNumber(2)">2</button>
                <button class="num-btn" onclick="addNumber(3)">3</button>
                <button class="num-btn" onclick="addNumber(4)">4</button>
                <button class="num-btn" onclick="addNumber(5)">5</button>
                <button class="num-btn" onclick="addNumber(6)">6</button>
                <button class="num-btn" onclick="addNumber(7)">7</button>
                <button class="num-btn" onclick="addNumber(8)">8</button>
                <button class="num-btn" onclick="addNumber(9)">9</button>
                <button class="num-btn clear-btn" onclick="clearAnswer()">C</button>
                <button class="num-btn" onclick="addNumber(0)">0</button>
                <button class="num-btn action-btn" onclick="checkNumber()">GO</button>
            </div>
            
            <button id="hintBtn" onclick="showHint()">💡 Need a Hint?</button>
            <div id="hintDisplay"></div>
        </div>

        <div id="ruleArea">
            <h2 style="color: #9c27b0;">Great! Now, what is the secret rule?</h2>
            <div id="ruleButtons"></div>
        </div>

        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextProblem()">Next Code ➡️</button>

        <div class="progress">Codes Cracked: <span id="score">0</span> / <span id="totalQuestions"></span></div>
    </div>

    <div id="endScreen" class="card">
        <h1>🏆 Master Decoder! 🏆</h1>
        <h2>You broke all the arithmetic patterns!</h2>
        <h1 style="font-size: 80px; margin: 20px;">🕵️‍♀️🔐🔓</h1>
        <button class="num-btn action-btn" style="width: 100%;" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // 👇 ADD OR EDIT PATTERNS HERE 👇
        const patterns = [
            {
                sequence: "2, 4, 6, 8, ?",
                missingNum: 10,
                ruleAnswer: "Add 2",
                ruleOptions: ["Add 2", "Subtract 2", "Multiply by 2"],
                hint: "Look at the 2 and the 4. Did the number get bigger or smaller? By how much?"
            },
            {
                sequence: "20, 16, 12, 8, ?",
                missingNum: 4,
                ruleAnswer: "Subtract 4",
                ruleOptions: ["Add 4", "Subtract 4", "Divide by 2"],
                hint: "Look at the 20 and the 16. The numbers are going down. How many did you take away?"
            },
            {
                sequence: "3, 6, 12, 24, ?",
                missingNum: 48,
                ruleAnswer: "Multiply by 2",
                ruleOptions: ["Add 3", "Multiply by 2", "Multiply by 3"],
                hint: "These numbers are jumping up really fast! What happens if you double 12?"
            },
            {
                sequence: "40, 20, 10, ?",
                missingNum: 5,
                ruleAnswer: "Divide by 2",
                ruleOptions: ["Subtract 20", "Divide by 2", "Subtract 10"],
                hint: "The numbers are getting sliced exactly in half every time!"
            },
            {
                sequence: "1, 5, 9, 13, ?",
                missingNum: 17,
                ruleAnswer: "Add 4",
                ruleOptions: ["Add 5", "Add 4", "Multiply by 5"],
                hint: "Count on your fingers starting from 1 to get to 5. How many fingers did you hold up?"
            }
        ];

        let currentIndex = 0;
        let currentAnswer = "";
        let attemptsThisProblem = 0;
        let audioCtx;

        document.getElementById('totalQuestions').innerText = patterns.length;

        function startGame() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            loadProblem();
        }

        function loadProblem() {
            currentAnswer = "";
            attemptsThisProblem = 0;
            
            // Reset the UI state
            document.getElementById('answerBox').innerText = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('hintBtn').style.display = 'none';
            document.getElementById('hintDisplay').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            document.getElementById('numberPhase').style.display = 'block';
            document.getElementById('ruleArea').style.display = 'none';
            
            // Load content
            document.getElementById('currentLevelNum').innerText = currentIndex + 1;
            document.getElementById('sequenceDisplay').innerText = patterns[currentIndex].sequence;
            document.getElementById('hintDisplay').innerText = patterns[currentIndex].hint;
        }

        function addNumber(num) {
            if (currentAnswer.length < 3) {
                currentAnswer += num;
                document.getElementById('answerBox').innerText = currentAnswer;
            }
        }

        function clearAnswer() {
            currentAnswer = "";
            document.getElementById('answerBox').innerText = currentAnswer;
        }

        function checkNumber() {
            if (currentAnswer === "") return;

            let guess = parseInt(currentAnswer);
            let correct = patterns[currentIndex].missingNum;
            let feedbackEl = document.getElementById('feedback');

            if (guess === correct) {
                playDing();
                feedbackEl.innerText = "";
                
                // Swap from number pad to rule selection
                document.getElementById('numberPhase').style.display = 'none';
                document.getElementById('ruleArea').style.display = 'block';
                
                // Update the sequence display to show the found number!
                document.getElementById('sequenceDisplay').innerText = patterns[currentIndex].sequence.replace("?", guess);
                
                buildRuleButtons();

            } else {
                playWrongBuzz();
                attemptsThisProblem++;
                feedbackEl.innerText = "❌ Not quite! Try again.";
                feedbackEl.style.color = "#f44336";
                clearAnswer();

                if (attemptsThisProblem >= 1) {
                    document.getElementById('hintBtn').style.display = 'inline-block';
                }
            }
        }

        function buildRuleButtons() {
            const ruleDiv = document.getElementById('ruleButtons');
            ruleDiv.innerHTML = '';
            
            // Randomize the buttons so the answer isn't always in the same spot
            let options = [...patterns[currentIndex].ruleOptions].sort(() => Math.random() - 0.5);
            
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'rule-btn';
                btn.innerText = opt;
                btn.onclick = () => checkRule(opt);
                ruleDiv.appendChild(btn);
            });
        }

        function checkRule(selectedRule) {
            let correctRule = patterns[currentIndex].ruleAnswer;
            let feedbackEl = document.getElementById('feedback');

            if (selectedRule === correctRule) {
                playDing();
                feedbackEl.innerText = "✅ You cracked the whole pattern!";
                feedbackEl.style.color = "#32cd32";
                
                // Disable rule buttons
                let allBtns = document.querySelectorAll('.rule-btn');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                
                document.getElementById('nextBtn').style.display = 'inline-block';
                document.getElementById('score').innerText = currentIndex + 1;
            } else {
                playWrongBuzz();
                feedbackEl.innerText = "❌ That's not the secret rule. Try again!";
                feedbackEl.style.color = "#f44336";
            }
        }

        function showHint() {
            document.getElementById('hintBtn').style.display = 'none';
            document.getElementById('hintDisplay').style.display = 'block';
        }

        function nextProblem() {
            currentIndex++;
            if (currentIndex >= patterns.length) {
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('endScreen').style.display = 'block';
                playVictoryFanfare();
            } else {
                loadProblem();
            }
        }

        // --- Audio Synthesizer Logic ---
        function playTone(type, freq, dur) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.2); }
        
        function playVictoryFanfare() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const chords = [
                { frequencies: [261.63, 329.63, 392.00], duration: 0.4, startTime: 0 },
                { frequencies: [349.23, 440.00, 523.25], duration: 0.4, startTime: 0.4 },
                { frequencies: [392.00, 493.88, 587.33], duration: 0.4, startTime: 0.8 },
                { frequencies: [261.63, 329.63, 392.00, 523.25], duration: 1.5, startTime: 1.2 }
            ];
            chords.forEach(chord => {
                chord.frequencies.forEach(freq => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + chord.startTime);
                    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + chord.startTime + 0.05);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime + chord.startTime + chord.duration - 0.1);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + chord.startTime + chord.duration);
                    osc.start(audioCtx.currentTime + chord.startTime);
                    osc.stop(audioCtx.currentTime + chord.startTime + chord.duration);
                });
            });
        }
    </script>
</body>
</html>
