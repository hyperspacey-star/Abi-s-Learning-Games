<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Detective</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        #game-container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #ff6b6b; }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 20px;
        }
        #sentence-display {
            font-size: 1.8em;
            background-color: #ffe66d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        input[type="text"] {
            width: 90%;
            font-size: 1.5em;
            padding: 10px;
            border: 3px solid #4ecdc4;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: inherit;
        }
        button {
            font-size: 1.3em;
            padding: 10px 30px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); }
        #feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            min-height: 30px;
        }
        .correct { color: #2ecc71; }
        .incorrect { color: #e74c3c; }
        .hint { font-size: 0.9em; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🔍 Grammar Detective</h1>
    
    <div class="stats">
        <div id="level-display">Level: 1 (Easy)</div>
        <div id="score-display">Score: 0</div>
    </div>

    <p>Fix the sentence below! Add capital letters and punctuation.</p>
    
    <div id="sentence-display">loading...</div>
    
    <input type="text" id="user-input" placeholder="Type the correct sentence here..." autocomplete="off" spellcheck="false">
    <br>
    <button onclick="checkAnswer()">Check Answer</button>
    <button onclick="nextSentence()" id="next-btn" style="display:none; background-color: #4ecdc4;">Next Sentence ➡️</button>

    <div id="feedback"></div>
    <div id="hint" class="hint"></div>
</div>

<script>
    // Sentence Database: Easy at first, getting harder!
    const sentenceBank = [
        // Level 1: Basic Capitalization and Periods
        { level: 1, broken: "the cat is sleeping", fixed: "The cat is sleeping." },
        { level: 1, broken: "i like to eat apples", fixed: "I like to eat apples." },
        { level: 1, broken: "my dog is very fast", fixed: "My dog is very fast." },
        { level: 1, broken: "we went to the park", fixed: "We went to the park." },
        { level: 1, broken: "she has a red balloon", fixed: "She has a red balloon." },
        { level: 1, broken: "the sun is shining today", fixed: "The sun is shining today." },
        { level: 1, broken: "he plays with his toys", fixed: "He plays with his toys." },
        { level: 1, broken: "i see a big blue bird", fixed: "I see a big blue bird." },
        { level: 1, broken: "the frog jumps high", fixed: "The frog jumps high." },
        { level: 1, broken: "my mom makes good cookies", fixed: "My mom makes good cookies." },

        // Level 2: Questions and Exclamations
        { level: 2, broken: "where is my left shoe", fixed: "Where is my left shoe?" },
        { level: 2, broken: "watch out for that car", fixed: "Watch out for that car!" },
        { level: 2, broken: "can you help me read this", fixed: "Can you help me read this?" },
        { level: 2, broken: "happy birthday to you", fixed: "Happy birthday to you!" },
        { level: 2, broken: "what is your favorite color", fixed: "What is your favorite color?" },
        { level: 2, broken: "i won the game", fixed: "I won the game!" },
        { level: 2, broken: "how old are you", fixed: "How old are you?" },
        { level: 2, broken: "that is so awesome", fixed: "That is so awesome!" },
        { level: 2, broken: "are we there yet", fixed: "Are we there yet?" },
        { level: 2, broken: "look at that huge dinosaur", fixed: "Look at that huge dinosaur!" },

        // Level 3: Names and Days of the Week (Mid-sentence capitals)
        { level: 3, broken: "sarah and i play on monday", fixed: "Sarah and I play on Monday." },
        { level: 3, broken: "is mr smith your teacher", fixed: "Is Mr. Smith your teacher?" },
        { level: 3, broken: "we go to florida in july", fixed: "We go to Florida in July." },
        { level: 3, broken: "did tom see the movie", fixed: "Did Tom see the movie?" },
        { level: 3, broken: "my friend emily is nice", fixed: "My friend Emily is nice." },
        { level: 3, broken: "i love fridays at school", fixed: "I love Fridays at school!" },
        { level: 3, broken: "can max come over to play", fixed: "Can Max come over to play?" },
        { level: 3, broken: "santa comes in december", fixed: "Santa comes in December." },
        { level: 3, broken: "dr jones is very smart", fixed: "Dr. Jones is very smart." },
        { level: 3, broken: "i think halloween is fun", fixed: "I think Halloween is fun!" },

        // Level 4: Lists (Commas)
        { level: 4, broken: "i need eggs milk and bread", fixed: "I need eggs, milk, and bread." },
        { level: 4, broken: "we saw lions tigers and bears", fixed: "We saw lions, tigers, and bears." },
        { level: 4, broken: "she likes pink purple and blue", fixed: "She likes pink, purple, and blue." },
        { level: 4, broken: "pack your shirt pants and socks", fixed: "Pack your shirt, pants, and socks." },
        { level: 4, broken: "do you want apples grapes or plums", fixed: "Do you want apples, grapes, or plums?" },
        { level: 4, broken: "i can run jump and skip", fixed: "I can run, jump, and skip." },
        { level: 4, broken: "my pets are a dog a cat and a fish", fixed: "My pets are a dog, a cat, and a fish." },
        { level: 4, broken: "he draws squares circles and stars", fixed: "He draws squares, circles, and stars." },
        { level: 4, broken: "spring summer fall and winter", fixed: "Spring, summer, fall, and winter." },
        { level: 4, broken: "i brought a pencil paper and an eraser", fixed: "I brought a pencil, paper, and an eraser." }
    ];

    let currentLevel = 1;
    let score = 0;
    let currentSentence = {};

    function getLevelName(lvl) {
        if (lvl === 1) return "1 (Easy: Capitals & Periods)";
        if (lvl === 2) return "2 (Medium: ? and !)";
        if (lvl === 3) return "3 (Hard: Names & Days)";
        if (lvl === 4) return "4 (Expert: Commas)";
        return "Max";
    }

    function loadSentence() {
        // Filter sentences by current level
        const availableSentences = sentenceBank.filter(s => s.level === currentLevel);
        
        // Pick a random sentence from the available ones
        const randomIndex = Math.floor(Math.random() * availableSentences.length);
        currentSentence = availableSentences[randomIndex];

        // Update UI
        document.getElementById('sentence-display').innerText = currentSentence.broken;
        document.getElementById('user-input').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('hint').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        
        // Set focus back to input box
        document.getElementById('user-input').focus();
    }

    function checkAnswer() {
        const userInput = document.getElementById('user-input').value.trim();
        const feedbackEl = document.getElementById('feedback');
        const hintEl = document.getElementById('hint');

        if (userInput === currentSentence.fixed) {
            feedbackEl.innerText = "⭐ Fantastic! You got it right! ⭐";
            feedbackEl.className = "correct";
            hintEl.innerText = "";
            score += 10;
            
            // Check for level up! (Every 50 points = next level)
            if (score >= currentLevel * 50 && currentLevel < 4) {
                currentLevel++;
                alert("🎉 LEVEL UP! You are now a Level " + currentLevel + " Detective! 🎉");
                document.getElementById('level-display').innerText = "Level: " + getLevelName(currentLevel);
            }
            
            document.getElementById('score-display').innerText = "Score: " + score;
            document.getElementById('next-btn').style.display = 'inline-block';
        } else {
            feedbackEl.innerText = "Not quite! Try again.";
            feedbackEl.className = "incorrect";
            // Provide a hint based on the level
            if (currentLevel === 1) hintEl.innerText = "Hint: Don't forget your capital letter at the start and period at the end!";
            if (currentLevel === 2) hintEl.innerText = "Hint: Does this ask a question or show excitement?";
            if (currentLevel === 3) hintEl.innerText = "Hint: Names and days of the week need capital letters too!";
            if (currentLevel === 4) hintEl.innerText = "Hint: When listing 3 or more things, separate them with commas!";
        }
    }

    function nextSentence() {
        loadSentence();
    }

    // Allow pressing "Enter" to check the answer
    document.getElementById("user-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            if (document.getElementById('next-btn').style.display === 'inline-block') {
                nextSentence();
            } else {
                checkAnswer();
            }
        }
    });

    // Start the game
    loadSentence();
</script>

</body>
</html>
