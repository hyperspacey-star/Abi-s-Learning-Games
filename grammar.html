<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Detective</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        #game-container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #ff6b6b; }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 20px;
        }
        .option-btn {
            display: block;
            width: 100%;
            font-size: 1.3em;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f7f1e3;
            color: #333;
            border: 3px solid #d1ccc0;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #ffeaa7;
            border-color: #fdcb6e;
        }
        .option-btn:active { transform: translateY(2px); }
        .correct-btn {
            background-color: #55efc4 !important;
            border-color: #00b894 !important;
        }
        .incorrect-btn {
            background-color: #fab1a0 !important;
            border-color: #e17055 !important;
        }
        #next-btn {
            font-size: 1.3em;
            padding: 10px 30px;
            background-color: #4ecdc4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 15px;
        }
        #feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            min-height: 30px;
        }
        .correct { color: #00b894; }
        .incorrect { color: #d63031; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🔍 Detective Abi's Grammar Cases</h1>
    
    <div class="stats">
        <div id="level-display">Level: 1 (Easy)</div>
        <div id="score-display">Score: 0</div>
    </div>

    <p>Which sentence is written perfectly?</p>
    
    <div id="options-container">
        </div>
    
    <button onclick="nextSentence()" id="next-btn" style="display:none;">Next Case ➡️</button>

    <div id="feedback"></div>
</div>

<script>
    // Sentence Database: Easy at first, getting harder!
    const quizBank = [
        // Level 1: Basic Capitalization and Periods
        { level: 1, options: ["The cat is sleeping.", "the cat is sleeping.", "The cat is sleeping"], correctIndex: 0 },
        { level: 1, options: ["i like apples.", "I like apples", "I like apples."], correctIndex: 2 },
        { level: 1, options: ["My dog is fast.", "my dog is fast.", "My dog is fast"], correctIndex: 0 },
        { level: 1, options: ["We went to the park", "we went to the park.", "We went to the park."], correctIndex: 2 },
        
        // Level 2: Questions and Exclamations
        { level: 2, options: ["Where is my shoe?", "where is my shoe?", "Where is my shoe."], correctIndex: 0 },
        { level: 2, options: ["Watch out for that car!", "Watch out for that car.", "watch out for that car!"], correctIndex: 0 },
        { level: 2, options: ["can you help me read this?", "Can you help me read this.", "Can you help me read this?"], correctIndex: 2 },
        { level: 2, options: ["I won the game!", "i won the game!", "I won the game."], correctIndex: 0 },

        // Level 3: Names and Days of the Week
        { level: 3, options: ["sarah and I play on monday.", "Sarah and I play on Monday.", "Sarah and i play on Monday."], correctIndex: 1 },
        { level: 3, options: ["We go to Florida in July.", "we go to florida in july.", "We go to Florida in july."], correctIndex: 0 },
        { level: 3, options: ["Did Tom see the movie?", "Did tom see the movie?", "did Tom see the movie?"], correctIndex: 0 },
        { level: 3, options: ["I love Fridays at school!", "I love fridays at school!", "i love Fridays at school!"], correctIndex: 0 },

        // Level 4: Commas in a list
        { level: 4, options: ["I need eggs milk and bread.", "I need eggs, milk, and bread.", "i need eggs, milk, and bread."], correctIndex: 1 },
        { level: 4, options: ["We saw lions, tigers, and bears.", "We saw lions tigers, and bears.", "We saw lions tigers and bears."], correctIndex: 0 },
        { level: 4, options: ["She likes pink, purple and blue", "she likes pink, purple, and blue.", "She likes pink, purple, and blue."], correctIndex: 2 },
        { level: 4, options: ["I can run, jump, and skip.", "I can run jump and skip.", "i can run, jump, and skip."], correctIndex: 0 }
    ];

    let currentLevel = 1;
    let score = 0;
    let currentQuiz = {};
    let answered = false;

    function getLevelName(lvl) {
        if (lvl === 1) return "1 (Capitals & Periods)";
        if (lvl === 2) return "2 (Questions & Exclamations)";
        if (lvl === 3) return "3 (Names & Days)";
        if (lvl === 4) return "4 (Expert Commas)";
        return "Max";
    }

    function loadSentence() {
        answered = false;
        // Filter sentences by current level
        const availableQuizzes = quizBank.filter(q => q.level === currentLevel);
        
        // Pick a random quiz
        const randomIndex = Math.floor(Math.random() * availableQuizzes.length);
        currentQuiz = availableQuizzes[randomIndex];

        // Clear previous UI
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';

        // Create buttons
        currentQuiz.options.forEach((optionText, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optionText;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, clickedBtn) {
        if (answered) return; // Prevent clicking multiple times
        answered = true;

        const feedbackEl = document.getElementById('feedback');
        const allButtons = document.querySelectorAll('.option-btn');

        if (selectedIndex === currentQuiz.correctIndex) {
            clickedBtn.classList.add('correct-btn');
            feedbackEl.innerText = "⭐ Spot on, Detective! ⭐";
            feedbackEl.className = "correct";
            score += 10;
            
            // Check for level up! (40 points = next level for this demo)
            if (score >= currentLevel * 40 && currentLevel < 4) {
                currentLevel++;
                alert("🎉 LEVEL UP! You are now investigating Level " + currentLevel + " cases! 🎉");
                document.getElementById('level-display').innerText = "Level: " + getLevelName(currentLevel);
            }
            
            document.getElementById('score-display').innerText = "Score: " + score;
        } else {
            clickedBtn.classList.add('incorrect-btn');
            allButtons[currentQuiz.correctIndex].classList.add('correct-btn'); // Show the right one
            feedbackEl.innerText = "Oops! Look closely at the highlighted correct answer.";
            feedbackEl.className = "incorrect";
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextSentence() {
        loadSentence();
    }

    // Start the game
    loadSentence();
</script>

</body>
</html>
