<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Spelling Rescue</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #f3e5f5; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #8e24aa; font-size: 36px; margin-top: 10px; margin-bottom: 5px; }
        
        .card { background-color: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        
        /* Hearts / Lives */
        #livesDisplay { font-size: 40px; margin: 10px 0; min-height: 50px; }
        
        /* The Secret Word Blanks */
        #wordDisplay { 
            font-size: 48px; 
            font-weight: bold; 
            color: #333; 
            letter-spacing: 10px; 
            margin: 30px 0; 
            min-height: 70px;
            font-family: monospace;
        }
        
        /* Audio Button */
        .btn-audio { 
            background-color: #03a9f4; 
            color: white; 
            padding: 15px 30px; 
            font-size: 24px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            gap: 10px;
        }
        .btn-audio:active { transform: translateY(3px); box-shadow: none; }
        
        /* Touch Keyboard */
        #keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .key { 
            background-color: #fff; 
            border: 3px solid #ce93d8; 
            color: #8e24aa; 
            font-size: 28px; 
            font-weight: bold; 
            width: 55px; 
            height: 65px; 
            border-radius: 10px; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #ce93d8;
            font-family: 'Comic Sans MS', Arial;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .key:disabled { background-color: #e0e0e0; border-color: #bdbdbd; color: #9e9e9e; box-shadow: none; transform: none; cursor: default; }
        .key.correct { background-color: #c8e6c9; border-color: #4caf50; color: #2e7d32; }
        .key.wrong { background-color: #ffcdd2; border-color: #f44336; color: #c62828; }

        /* Game State Screens */
        #gameArea, #endScreen { display: none; }
        
        .btn-start { background-color: #e91e63; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 0 #ad1457; }
        .btn-start:active { transform: translateY(5px); box-shadow: none; }

        #message { font-size: 28px; font-weight: bold; margin-top: 20px; min-height: 40px; color: #ff9800; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <h1>🎧 Listen & Spell!</h1>
        <p style="font-size: 24px; color: #555;">Tap the button below to begin.</p>
        <button class="btn-start" onclick="startGame()">Start Game! ▶️</button>
    </div>

    <div class="card" id="gameArea">
        <div id="livesDisplay">❤️❤️❤️❤️❤️❤️</div>
        
        <button class="btn-audio" onclick="playAudio()">
            🔊 Hear Word Again
        </button>

        <div id="wordDisplay">_ _ _ _ _</div>
        
        <div id="message"></div>

        <div id="keyboard"></div>
        
        <button id="nextBtn" class="btn-start" style="display: none; margin-left: auto; margin-right: auto; margin-top: 20px; background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32;" onclick="nextWord()">Next Word ➡️</button>
    </div>

    <div class="card" id="endScreen">
        <h1>🎉 YOU DID IT! 🎉</h1>
        <p style="font-size: 24px;">You spelled all the words!</p>
        <button class="btn-start" onclick="location.reload()">Play Again 🔄</button>
    </div>

    <script>
        // 👇 EDIT YOUR WEEKLY WORDS RIGHT HERE 👇
        let words = [
            "point",
            "sprout",
            "moisture",
            "shower",
            "cloud",
            "south",
            "soil",
            "downpour",
            "noise",
            "proud",
            "mouth",
            "scout",
            "spoil"
        ];
        // 👆 --------------------------------- 👆

        let currentWordIndex = 0;
        let currentWord = "";
        let guessedLetters = [];
        let mistakes = 0;
        const maxMistakes = 6;
        let currentAudio = null; // Keeps track of the currently playing audio

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            loadWord();
        }

        function loadWord() {
            currentWord = words[currentWordIndex].toUpperCase();
            guessedLetters = [];
            mistakes = 0;
            
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('message').innerText = "";
            document.getElementById('keyboard').style.pointerEvents = "auto";
            
            updateLivesDisplay();
            updateWordDisplay();
            buildKeyboard();
            
            playAudio();
        }

        function playAudio() {
            // Stop any currently playing audio so it doesn't overlap if tapped fast
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            // Construct the file path dynamically looking inside the "audio" folder
            currentAudio = new Audio('audio/' + currentWord.toLowerCase() + '.wav');
            currentAudio.play().catch(function(error) {
                console.log("Audio autoplay blocked by browser until direct interaction.");
            });
        }

        function updateWordDisplay() {
            let displayString = "";
            let isWin = true;

            for (let i = 0; i < currentWord.length; i++) {
                let letter = currentWord[i];
                if (guessedLetters.includes(letter)) {
                    displayString += letter + " ";
                } else {
                    displayString += "_ ";
                    isWin = false;
                }
            }
            
            document.getElementById('wordDisplay').innerText = displayString.trim();

            if (isWin) {
                document.getElementById('message').innerText = "✅ Excellent!";
                document.getElementById('message').style.color = "#4caf50";
                document.getElementById('keyboard').style.pointerEvents = "none"; // Disable typing
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function updateLivesDisplay() {
            let livesLeft = maxMistakes - mistakes;
            let heartString = "";
            for(let i=0; i<livesLeft; i++) { heartString += "❤️"; }
            for(let i=0; i<mistakes; i++) { heartString += "🖤"; }
            document.getElementById('livesDisplay').innerText = heartString;

            if (livesLeft === 0) {
                document.getElementById('message').innerText = "❌ The word was: " + currentWord;
                document.getElementById('message').style.color = "#f44336";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('wordDisplay').innerText = currentWord.split('').join(' ');
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function handleGuess(letter, btnElement) {
            btnElement.disabled = true;
            guessedLetters.push(letter);

            if (currentWord.includes(letter)) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                mistakes++;
            }

            updateWordDisplay();
            updateLivesDisplay();
        }

        function buildKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            keyboardDiv.innerHTML = ''; // Clear old keyboard
            
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let i = 0; i < alphabet.length; i++) {
                let letter = alphabet[i];
                let btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = letter;
                btn.onclick = () => handleGuess(letter, btn);
                keyboardDiv.appendChild(btn);
            }
        }

        function nextWord() {
            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('endScreen').style.display = 'block';
            } else {
                loadWord();
            }
        }
    </script>
</body>
</html>
