<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Fact Family Connector</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #f3e5f5; text-align: center; margin: 0; }
        h1 { color: #8e24aa; font-size: 32px; margin-bottom: 5px; }
        h2 { color: #ab47bc; margin-top: 0; font-size: 20px; }
        
        .card { background-color: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        
        /* Scaffolding & UI */
        #topBar { display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        #streakDisplay { color: #f57c00; }
        #levelDisplay { color: #1976d2; }

        #promptText { font-size: 26px; color: #d84315; font-weight: bold; min-height: 40px; margin-bottom: 10px; }
        #equationDisplay { font-size: 55px; font-weight: bold; color: #4a148c; letter-spacing: 5px; min-height: 70px; background: #e1bee7; border-radius: 15px; padding: 10px; display: inline-block; min-width: 300px; margin-bottom: 15px;}
        
        /* Visual Fact Family Triangle */
        #scaffoldContainer { display: none; justify-content: center; align-items: center; margin: 10px 0; }
        .svg-text { font-family: 'Comic Sans MS', Arial, sans-serif; font-size: 24px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: central; }

        /* Number Pad */
        #numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 400px; margin: 10px auto; }
        .num-btn { background-color: #ab47bc; color: white; font-size: 36px; padding: 20px 0; border: none; border-radius: 15px; font-weight: bold; box-shadow: 0 6px 0 #7b1fa2; cursor: pointer; transition: transform 0.1s; }
        .num-btn:active { transform: translateY(6px); box-shadow: none; }
        .action-btn { background-color: #ff5252; box-shadow: 0 6px 0 #d32f2f; }
        
        .btn-start { background-color: #4caf50; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 6px 0 #388e3c; }
        .btn-start:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>

    <h1>📐 Fact Family Connector</h1>
    <h2>Mastering Multiplication & Division</h2>

    <div class="card" id="startScreen">
        <p style="font-size: 22px; color: #555;">Use the connection between multiplying and dividing to solve the puzzles!</p>
        <button class="btn-start" onclick="startGame()">Start Playing! ▶️</button>
    </div>

    <div class="card" id="gameArea" style="display: none;">
        <div id="topBar">
            <div id="streakDisplay">⭐ Streak: 0</div>
            <div id="levelDisplay">🏆 Level: 1</div>
        </div>
        
        <div id="promptText">Solve the equation!</div>
        
        <!-- Fact Family Triangle (Hidden until she misses) -->
        <div id="scaffoldContainer">
            <svg width="220" height="180">
                <!-- Triangle Lines -->
                <line x1="110" y1="30" x2="40" y2="140" stroke="#ccc" stroke-width="6"/>
                <line x1="110" y1="30" x2="180" y2="140" stroke="#ccc" stroke-width="6"/>
                <line x1="40" y1="140" x2="180" y2="140" stroke="#ccc" stroke-width="6"/>
                
                <!-- Top Node (Product) -->
                <circle cx="110" cy="30" r="30" fill="#f57c00"/>
                <text x="110" y="32" class="svg-text" id="tri-top">P</text>

                <!-- Bottom Left Node (Factor 1) -->
                <circle cx="40" cy="140" r="30" fill="#2196f3"/>
                <text x="40" y="142" class="svg-text" id="tri-left">F1</text>

                <!-- Bottom Right Node (Factor 2) -->
                <circle cx="180" cy="140" r="30" fill="#4caf50"/>
                <text x="180" y="142" class="svg-text" id="tri-right">F2</text>
            </svg>
        </div>

        <div id="equationDisplay">_ × _ = ?</div>

        <div id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn action-btn" onclick="clearInput()">C</button>
            <button class="num-btn" onclick="inputNumber(0)">0</button>
            <button class="num-btn" style="background-color: #4caf50; box-shadow: 0 6px 0 #388e3c;" onclick="checkAnswer()">ENTER</button>
        </div>
    </div>

    <script>
        let level = 1;
        let streak = 0;
        
        let factor1, factor2, product;
        let isDivision = false;
        let expectedAnswer = 0;
        let currentInput = "";
        
        let inScaffoldMode = false;
        let scaffoldStep = 0;

        // Audio Context for synthesized feedback
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
        }

        function playTone(type, freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.3); }
        function playVictory() {
            playTone('triangle', 523.25, 0.2);
            setTimeout(() => playTone('triangle', 659.25, 0.2), 200);
            setTimeout(() => playTone('triangle', 783.99, 0.4), 400);
        }

        function startGame() {
            initAudio();
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            generateProblem();
        }

        function generateProblem() {
            currentInput = "";
            inScaffoldMode = false;
            document.getElementById('scaffoldContainer').style.display = 'none';
            document.getElementById('promptText').style.color = "#d84315";

            // Auto-Leveling Logic
            let min = 2, max = 5;
            if (level === 2) { min = 2; max = 9; }
            if (level === 3) { min = 2; max = 12; }

            factor1 = Math.floor(Math.random() * (max - min + 1)) + min;
            factor2 = Math.floor(Math.random() * (max - min + 1)) + min;
            product = factor1 * factor2;

            // 50% chance of multiplication, 50% chance of division
            isDivision = Math.random() > 0.5;

            if (isDivision) {
                expectedAnswer = factor2;
                updateScreen("Solve the division!", `${product} ÷ ${factor1} = ?`);
            } else {
                expectedAnswer = product;
                updateScreen("Solve the multiplication!", `${factor1} × ${factor2} = ?`);
            }
        }

        function updateScreen(promptMsg, eqText) {
            document.getElementById('promptText').innerText = promptMsg;
            // Replace the question mark with the user's typed input
            let displayEq = eqText.replace("?", currentInput === "" ? "?" : currentInput);
            document.getElementById('equationDisplay').innerText = displayEq;
        }

        function inputNumber(num) {
            currentInput += num.toString();
            // Refresh screen to show typed numbers
            if (inScaffoldMode) {
                if (scaffoldStep === 1 && isDivision) updateScreen(`Use multiplication! ${factor1} × what makes ${product}?`, `${factor1} × ? = ${product}`);
                else if (scaffoldStep === 2 && isDivision) updateScreen(`Great! Now use that to solve the division!`, `${product} ÷ ${factor1} = ?`);
                else updateScreen("Look at the Fact Family Triangle!", `${factor1} × ${factor2} = ?`);
            } else {
                if (isDivision) updateScreen("Solve the division!", `${product} ÷ ${factor1} = ?`);
                else updateScreen("Solve the multiplication!", `${factor1} × ${factor2} = ?`);
            }
        }

        function clearInput() {
            currentInput = "";
            inputNumber(""); // hack to force screen update
        }

        function checkAnswer() {
            if (currentInput === "") return;
            
            let playerAnswer = parseInt(currentInput);

            if (playerAnswer === expectedAnswer) {
                playDing();
                currentInput = "";

                if (inScaffoldMode) {
                    // Scaffold Progression
                    if (scaffoldStep === 1 && isDivision) {
                        // She got the multiplication hint right, now return to the original division problem!
                        scaffoldStep = 2;
                        expectedAnswer = factor2;
                        document.getElementById('tri-right').innerText = factor2; // Reveal the missing piece
                        updateScreen(`Great! Now use that to solve the division!`, `${product} ÷ ${factor1} = ?`);
                    } else {
                        // Scaffold complete
                        document.getElementById('promptText').innerText = "✅ Excellent Fact Family usage!";
                        setTimeout(generateProblem, 1500);
                    }
                } else {
                    // Standard correct answer
                    streak++;
                    document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                    document.getElementById('promptText').innerText = "✅ Great Job!";
                    
                    if (isDivision) document.getElementById('equationDisplay').innerText = `${product} ÷ ${factor1} = ${factor2}`;
                    else document.getElementById('equationDisplay').innerText = `${factor1} × ${factor2} = ${product}`;

                    checkLevelUp();
                    setTimeout(generateProblem, 1500);
                }
            } else {
                playWrongBuzz();
                currentInput = "";
                streak = 0;
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                triggerScaffold();
            }
        }

        function triggerScaffold() {
            inScaffoldMode = true;
            document.getElementById('scaffoldContainer').style.display = 'flex';
            document.getElementById('promptText').style.color = "#1976d2";

            if (isDivision) {
                // If she missed division, force her to solve the multiplication inverse first
                scaffoldStep = 1;
                expectedAnswer = factor2;
                
                document.getElementById('tri-top').innerText = product;
                document.getElementById('tri-left').innerText = factor1;
                document.getElementById('tri-right').innerText = "?";

                updateScreen(`Use multiplication! ${factor1} × what makes ${product}?`, `${factor1} × ? = ${product}`);
            } else {
                // If she missed multiplication, show her the full triangle to help her visualize
                scaffoldStep = 1;
                expectedAnswer = product;

                document.getElementById('tri-top').innerText = "?";
                document.getElementById('tri-left').innerText = factor1;
                document.getElementById('tri-right').innerText = factor2;

                updateScreen("Look at the Fact Family Triangle!", `${factor1} × ${factor2} = ?`);
            }
        }

        function checkLevelUp() {
            if (streak >= 5 && level < 3) {
                level++;
                streak = 0;
                playVictory();
                document.getElementById('levelDisplay').innerText = `🏆 Level: ${level}`;
                document.getElementById('streakDisplay').innerText = `⭐ Streak: ${streak}`;
                document.getElementById('promptText').innerText = "🌟 LEVEL UP! 🌟";
            }
        }
    </script>
</body>
</html>
