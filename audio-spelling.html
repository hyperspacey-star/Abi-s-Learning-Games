<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Spelling - EASY</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #e3f2fd; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #1565c0; font-size: 36px; margin-top: 10px; margin-bottom: 5px; }
        .card { background-color: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 800px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); border: 3px solid #90caf9; }
        #livesDisplay { font-size: 40px; margin: 10px 0; min-height: 50px; }
        #wordDisplay { font-size: 48px; font-weight: bold; color: #333; letter-spacing: 10px; margin: 20px 0; min-height: 70px; font-family: monospace; }
        .btn-audio { background-color: #2196f3; color: white; padding: 15px 30px; font-size: 24px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .btn-audio:active { transform: translateY(3px); box-shadow: none; }
        #keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .key { background-color: #fff; border: 3px solid #bbdefb; color: #1565c0; font-size: 28px; font-weight: bold; width: 55px; height: 65px; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #bbdefb; font-family: 'Comic Sans MS', Arial; }
        .key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .key:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; background-color: #e0e0e0; border-color: #bdbdbd; color: #9e9e9e; }
        #gameArea, #endScreen { display: none; }
        .btn-start { background-color: #4caf50; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 0 #2e7d32; }
        #message { font-size: 28px; font-weight: bold; margin-top: 10px; min-height: 40px; color: #ff9800; }
        .mode-badge { background-color: #4caf50; color: white; padding: 5px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; letter-spacing: 2px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <div class="mode-badge">🌟 EASY MODE 🌟</div>
        <h1>🎧 Listen & Spell!</h1>
        <p style="font-size: 20px; color: #555;">Guess the letters to build the word!</p>
        <button class="btn-start" onclick="startGame()">Start Game! ▶️</button>
    </div>

    <div class="card" id="gameArea">
        <div id="livesDisplay">❤️❤️❤️❤️❤️❤️</div>
        <button class="btn-audio" onclick="playAudio()">🔊 Listen</button>
        <div id="wordDisplay">_ _ _ _ _</div>
        <div id="message"></div>
        <div id="keyboard"></div>
        <button id="nextBtn" class="btn-start" style="display: none; margin: auto; margin-top: 20px;" onclick="nextWord()">Next Word ➡️</button>
    </div>

    <div class="card" id="endScreen">
        <h1>🎉 ALL DONE! 🎉</h1>
        <p style="font-size: 24px;">Great job practicing your spelling!</p>
        <button class="btn-start" onclick="location.reload()">Play Again 🔄</button>
    </div>

    <script>
        let words = ["spoil", "scout", "mouth", "proud", "noise", "downpour", "soil", "south", "cloud", "shower"];

        let currentWordIndex = 0;
        let currentWord = "";
        let guessedLetters = new Set();
        let mistakes = 0;
        const maxMistakes = 6;
        
        let currentAudio = new Audio();
        currentAudio.onerror = function() { alert("🚨 FILE NOT FOUND 🚨\n\nLooking for:\n" + currentAudio.src); };

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            loadWord();
        }

        function loadWord() {
            currentWord = words[currentWordIndex].toUpperCase();
            guessedLetters.clear();
            mistakes = 0;
            
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('message').innerText = "";
            document.getElementById('keyboard').style.pointerEvents = "auto";
            
            updateLivesDisplay();
            updateWordDisplay();
            buildKeyboard();
        }

        function playAudio() {
            currentAudio.src = 'audio/' + words[currentWordIndex].toLowerCase() + '.wav';
            currentAudio.play().catch(e => alert("Audio blocked. Try tapping again!"));
        }

        function updateWordDisplay() {
            let displayString = "";
            let isComplete = true;
            for (let char of currentWord) {
                if (guessedLetters.has(char)) {
                    displayString += char + " ";
                } else {
                    displayString += "_ ";
                    isComplete = false;
                }
            }
            document.getElementById('wordDisplay').innerText = displayString.trim();

            if (isComplete) {
                document.getElementById('message').innerText = "✅ Excellent!";
                document.getElementById('message').style.color = "#4caf50";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function updateLivesDisplay() {
            let livesLeft = maxMistakes - mistakes;
            let heartString = "";
            for(let i=0; i<livesLeft; i++) { heartString += "❤️"; }
            for(let i=0; i<mistakes; i++) { heartString += "🖤"; }
            document.getElementById('livesDisplay').innerText = heartString;

            if (livesLeft <= 0) {
                document.getElementById('message').innerText = "❌ The word was: " + currentWord;
                document.getElementById('message').style.color = "#f44336";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('wordDisplay').innerText = currentWord.split('').join(' ');
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function handleGuess(letter, btnElement) {
            btnElement.disabled = true;
            guessedLetters.add(letter);
            
            if (currentWord.includes(letter)) {
                updateWordDisplay();
            } else {
                mistakes++;
                updateLivesDisplay();
            }
        }

        function buildKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            keyboardDiv.innerHTML = ''; 
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let i = 0; i < alphabet.length; i++) {
                let letter = alphabet[i];
                let btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = letter;
                btn.onclick = () => handleGuess(letter, btn);
                keyboardDiv.appendChild(btn);
            }
        }

        function nextWord() {
            currentWordIndex++;
            if (currentWordIndex >= words.length) {
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('endScreen').style.display = 'block';
            } else {
                loadWord();
            }
        }
    </script>
</body>
</html>
