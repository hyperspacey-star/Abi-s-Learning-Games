<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abi's Garden Builder</title>
    <style>
        body {
            font-family: 'Comic Sans MS', Arial, sans-serif;
            background-color: #e8f5e9;
            text-align: center;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }

        h1 { color: #2e7d32; font-size: 36px; margin-bottom: 5px; }
        h2 { color: #1565c0; margin-top: 0; font-size: 22px; }

        .dashboard {
            background-color: white;
            padding: 15px;
            border-radius: 15px;
            margin: 0 auto 20px auto;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #424242;
        }

        .badges { font-size: 28px; letter-spacing: 5px; }

        .game-area {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 0 auto;
            max-width: 600px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        #questionText {
            font-size: 28px;
            color: #37474f;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* The Grid System */
        #blueprintContainer {
            display: inline-block;
            background-color: #c8e6c9;
            border: 4px solid #81c784;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .grid-row { display: flex; }

        .grid-cell {
            width: 40px;
            height: 40px;
            border: 1px solid #a5d6a7;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        .active-cell {
            background-color: #795548; /* Dirt color for the garden */
            border: 1px solid #5d4037;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        /* Input and Numpad */
        #answerDisplay {
            font-size: 40px;
            font-weight: bold;
            color: #1565c0;
            background-color: #e3f2fd;
            border: 3px solid #64b5f6;
            border-radius: 10px;
            width: 150px;
            height: 60px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 2px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .num-btn {
            background-color: #f5f5f5;
            color: #333;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #bdbdbd;
            border-radius: 10px;
            padding: 15px 0;
            cursor: pointer;
            box-shadow: 0 4px 0 #9e9e9e;
        }

        .num-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .action-btn { background-color: #ff9800; color: white; border-color: #f57c00; box-shadow: 0 4px 0 #e65100; }
        .submit-btn { background-color: #4caf50; color: white; border-color: #388e3c; box-shadow: 0 4px 0 #1b5e20; grid-column: span 3; }

        #hintBtn {
            background-color: #9c27b0;
            color: white;
            font-size: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #6a1b9a;
            display: none;
        }
        
        #hintBtn:active { transform: translateY(4px); box-shadow: none; }

        #feedback {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 35px;
        }

    </style>
</head>
<body>

    <h1>Abi's Area Architect</h1>
    <h2>Find the total area of the garden!</h2>

    <div class="dashboard">
        <div>Level: <span id="levelDisplay">1</span></div>
        <div class="badges" id="badgeDisplay"></div>
        <div>Streak: <span id="streakDisplay">0</span></div>
    </div>

    <div class="game-area">
        <div id="questionText">How many square units are in this garden?</div>
        
        <div id="blueprintContainer">
            </div>

        <div id="answerDisplay">?</div>

        <div class="numpad">
            <button class="num-btn" onclick="addNumber(1)">1</button>
            <button class="num-btn" onclick="addNumber(2)">2</button>
            <button class="num-btn" onclick="addNumber(3)">3</button>
            <button class="num-btn" onclick="addNumber(4)">4</button>
            <button class="num-btn" onclick="addNumber(5)">5</button>
            <button class="num-btn" onclick="addNumber(6)">6</button>
            <button class="num-btn" onclick="addNumber(7)">7</button>
            <button class="num-btn" onclick="addNumber(8)">8</button>
            <button class="num-btn" onclick="addNumber(9)">9</button>
            <button class="num-btn action-btn" onclick="clearAnswer()">CLR</button>
            <button class="num-btn" onclick="addNumber(0)">0</button>
            <button class="num-btn action-btn" onclick="deleteNumber()">DEL</button>
            <button class="num-btn submit-btn" onclick="checkAnswer()">Check Area</button>
        </div>

        <button id="hintBtn" onclick="showHint()">💡 Need a Blueprint Hint?</button>
        <div id="feedback"></div>
    </div>

    <script>
        // Game State Variables
        let level = 1;
        let streak = 0;
        let currentAnswer = "";
        let expectedArea = 0;
        let activeCells = [];
        let shapeData = {}; 

        // Audio Engine
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = new AudioContext();

        function playTone(type, freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.2); }
        function playLevelUp() {
            setTimeout(() => playTone('sine', 400, 0.2), 0);
            setTimeout(() => playTone('sine', 600, 0.2), 200);
            setTimeout(() => playTone('sine', 800, 0.4), 400);
        }

        // Numpad Functions
        function addNumber(num) {
            if (currentAnswer === "?") currentAnswer = "";
            if (currentAnswer.length < 3) {
                currentAnswer += num;
                document.getElementById('answerDisplay').innerText = currentAnswer;
            }
        }

        function clearAnswer() {
            currentAnswer = "";
            document.getElementById('answerDisplay').innerText = "?";
        }

        function deleteNumber() {
            if (currentAnswer !== "?" && currentAnswer.length > 0) {
                currentAnswer = currentAnswer.slice(0, -1);
                document.getElementById('answerDisplay').innerText = currentAnswer || "?";
            }
        }

        // Generate the Grid
        function generateProblem() {
            currentAnswer = "";
            document.getElementById('answerDisplay').innerText = "?";
            document.getElementById('feedback').innerText = "";
            document.getElementById('hintBtn').style.display = 'none';
            document.getElementById('answerDisplay').style.borderColor = "#64b5f6";
            
            let gridW = 10;
            let gridH = 10;
            activeCells = [];

            if (level === 1) {
                // Easy: 2x2 to 5x5
                shapeData.type = 'rectangle';
                shapeData.w = Math.floor(Math.random() * 4) + 2;
                shapeData.h = Math.floor(Math.random() * 4) + 2;
                gridW = shapeData.w;
                gridH = shapeData.h;
                expectedArea = shapeData.w * shapeData.h;
                
                for(let r=0; r<gridH; r++) {
                    for(let c=0; c<gridW; c++) {
                        activeCells.push(`${r},${c}`);
                    }
                }
                document.getElementById('questionText').innerText = `How many square units in this garden?`;
                
            } else if (level === 2) {
                // Medium: 2x2 to 10x10
                shapeData.type = 'rectangle';
                shapeData.w = Math.floor(Math.random() * 9) + 2;
                shapeData.h = Math.floor(Math.random() * 9) + 2;
                gridW = shapeData.w;
                gridH = shapeData.h;
                expectedArea = shapeData.w * shapeData.h;
                
                for(let r=0; r<gridH; r++) {
                    for(let c=0; c<gridW; c++) {
                        activeCells.push(`${r},${c}`);
                    }
                }
                document.getElementById('questionText').innerText = `This garden is ${shapeData.w} units wide and ${shapeData.h} units tall. Area?`;

            } else {
                // Hard: L-Shapes (Decomposition)
                shapeData.type = 'l-shape';
                let w1 = Math.floor(Math.random() * 4) + 2;
                let h1 = Math.floor(Math.random() * 4) + 2;
                let w2 = Math.floor(Math.random() * 4) + 2;
                let h2 = Math.floor(Math.random() * 4) + 2;
                
                gridW = w1 + w2;
                gridH = Math.max(h1, h2);
                expectedArea = (w1 * h1) + (w2 * h2);

                shapeData.rect1 = {w: w1, h: h1};
                shapeData.rect2 = {w: w2, h: h2};

                for(let r=0; r<h1; r++) {
                    for(let c=0; c<w1; c++) { activeCells.push(`${r},${c}`); }
                }
                for(let r=0; r<h2; r++) {
                    for(let c=w1; c<w1+w2; c++) { activeCells.push(`${r},${c}`); }
                }
                document.getElementById('questionText').innerText = `Find the TOTAL area of this L-shaped garden!`;
            }

            drawGrid(gridW, gridH);
        }

        function drawGrid(w, h) {
            const container = document.getElementById('blueprintContainer');
            container.innerHTML = '';
            
            // Auto scale cell size for big grids so it fits on iPad
            let cellSize = w > 6 || h > 6 ? 30 : 45;

            for (let r = 0; r < h; r++) {
                let rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                for (let c = 0; c < w; c++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'grid-cell';
                    cellDiv.style.width = `${cellSize}px`;
                    cellDiv.style.height = `${cellSize}px`;
                    cellDiv.id = `cell-${r}-${c}`;
                    
                    if (activeCells.includes(`${r},${c}`)) {
                        cellDiv.classList.add('active-cell');
                    }
                    rowDiv.appendChild(cellDiv);
                }
                container.appendChild(rowDiv);
            }
        }

        function checkAnswer() {
            if (currentAnswer === "" || currentAnswer === "?") return;
            
            let feedback = document.getElementById('feedback');
            
            if (parseInt(currentAnswer) === expectedArea) {
                playDing();
                feedback.innerText = "✅ You got it! Perfect Area!";
                feedback.style.color = "#2e7d32";
                document.getElementById('answerDisplay').style.borderColor = "#4caf50";
                
                streak++;
                checkLevelUp();
                updateDashboard();
                
                // Delay next problem so she can see she won
                setTimeout(generateProblem, 2000);
            } else {
                playWrongBuzz();
                streak = 0;
                updateDashboard();
                feedback.innerText = "❌ Not quite! Look at the grid.";
                feedback.style.color = "#d32f2f";
                document.getElementById('answerDisplay').style.borderColor = "#f44336";
                document.getElementById('hintBtn').style.display = 'inline-block';
                clearAnswer();
            }
        }

        function showHint() {
            document.getElementById('hintBtn').style.display = 'none';
            let count = 1;
            
            // Draw numbers inside the active dirt cells so she can just count them!
            for (let coord of activeCells) {
                let [r, c] = coord.split(',');
                let cell = document.getElementById(`cell-${r}-${c}`);
                if (cell) {
                    cell.innerText = count;
                    count++;
                }
            }

            if (shapeData.type === 'rectangle') {
                document.getElementById('feedback').innerText = `Hint: You can count the blocks, or multiply ${shapeData.w} × ${shapeData.h}!`;
                document.getElementById('feedback').style.color = "#1565c0";
            } else {
                document.getElementById('feedback').innerText = `Hint: Count the blocks, or split it into TWO rectangles and add them!`;
                document.getElementById('feedback').style.color = "#1565c0";
            }
        }

        function checkLevelUp() {
            let oldLevel = level;
            if (streak >= 10) level = 3;
            else if (streak >= 5) level = 2;
            else level = 1;

            if (level > oldLevel) {
                playLevelUp();
                document.getElementById('feedback').innerText = "🌟 LEVEL UP! 🌟";
            }
        }

        function updateDashboard() {
            document.getElementById('streakDisplay').innerText = streak;
            document.getElementById('levelDisplay').innerText = level;
            
            let badges = "";
            if (streak >= 3) badges += "🌱";
            if (streak >= 5) badges += "🌷";
            if (streak >= 8) badges += "🌻";
            if (streak >= 10) badges += "🌳";
            if (streak >= 15) badges += "🏆";
            
            document.getElementById('badgeDisplay').innerText = badges;
        }

        // Start game on load
        generateProblem();
    </script>
</body>
</html>
